<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Ops — CMMC Level 2 SSP Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text-muted:#8b949e;--accent:#58a6ff;--accent2:#1f6feb;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--radius:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:960px;margin:0 auto;padding:20px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 0;position:sticky;top:0;z-index:100}
header .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.logo{font-size:1.4em;font-weight:700}.logo span{color:var(--accent)}
.brand-sub{font-size:.75em;color:var(--text-muted)}
.progress-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 0}
.progress-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .4s;border-radius:3px}
.phase-labels{display:flex;justify-content:space-between;margin-top:8px;font-size:.7em;color:var(--text-muted)}
.phase-labels span.active{color:var(--accent);font-weight:600}
.phase-labels span.done{color:var(--green);cursor:pointer;text-decoration:underline}
.phase-labels span.done:hover{opacity:.8}
.phase{display:none;animation:fadeIn .3s}.phase.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
h2{font-size:1.5em;margin-bottom:8px}
h3{font-size:1.15em;margin:20px 0 10px;color:var(--accent)}
.subtitle{color:var(--text-muted);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-weight:600;margin-bottom:6px;font-size:.9em}
.form-group .hint{font-size:.8em;color:var(--text-muted);margin-bottom:4px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9em;font-family:var(--font)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:10px}
.checkbox-group label{display:flex;align-items:center;gap:6px;font-weight:400;cursor:pointer;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:.85em}
.checkbox-group label:has(input:checked){border-color:var(--accent);background:rgba(88,166,255,.1)}
.checkbox-group input{accent-color:var(--accent)}
.radio-group{display:flex;flex-wrap:wrap;gap:10px}
.radio-group label{display:flex;align-items:center;gap:6px;font-weight:400;cursor:pointer;padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:.9em}
.radio-group label:has(input:checked){border-color:var(--accent);background:rgba(88,166,255,.1)}
.radio-group input{accent-color:var(--accent)}
.yn-group{display:flex;gap:8px}
.yn-group label{padding:8px 20px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:.9em}
.yn-group label:has(input:checked){border-color:var(--green);background:rgba(63,185,80,.1)}
.nav-buttons{display:flex;justify-content:space-between;margin-top:32px;gap:12px;flex-wrap:wrap}
.btn{padding:10px 24px;border:none;border-radius:var(--radius);font-size:.9em;cursor:pointer;font-weight:600;transition:all .2s}
.btn-primary{background:var(--accent2);color:#fff}.btn-primary:hover{background:var(--accent)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.8}
.btn-success{background:var(--green);color:#000}.btn-success:hover{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.accordion{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.accordion-header{padding:14px 16px;background:var(--surface2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;user-select:none;transition:background .2s,padding-left .2s}
.accordion-header:hover{background:var(--border);padding-left:22px}
.accordion-header .arrow{transition:transform .2s}
.accordion.open .arrow{transform:rotate(90deg)}
.accordion-body{display:none;padding:16px;background:var(--surface)}
.accordion.open .accordion-body{display:block}
.control-family{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.family-header{padding:12px 16px;background:var(--surface2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600}
.family-header:hover{background:var(--border)}
.family-header .badge{font-size:.75em;padding:2px 8px;border-radius:12px;background:var(--surface);color:var(--text-muted)}
.family-body{display:none;padding:0}
.control-family.open .family-body{display:block}
.control-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
.control-row:hover{background:rgba(88,166,255,.03)}
.control-id{font-weight:700;font-size:.8em;color:var(--accent);min-width:120px;flex-shrink:0;padding-top:2px}
.control-desc{flex:1;font-size:.85em;color:var(--text-muted)}
.control-status{min-width:160px;flex-shrink:0}
.control-status select{width:100%;padding:6px 8px;font-size:.8em}
.search-box{margin-bottom:16px}
.search-box input{width:100%;padding:10px 14px;font-size:.95em}
.score-display{text-align:center;padding:30px}
.score-number{font-size:4em;font-weight:800;line-height:1}
.score-number.green{color:var(--green)}.score-number.yellow{color:var(--yellow)}.score-number.red{color:var(--red)}
.score-label{font-size:1.1em;color:var(--text-muted);margin-top:4px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin:24px 0}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .num{font-size:2em;font-weight:700}.stat-card .lbl{color:var(--text-muted);font-size:.85em}
.family-bar{margin-bottom:8px}
.family-bar-label{display:flex;justify-content:space-between;font-size:.85em;margin-bottom:4px}
.family-bar-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.family-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.doc-buttons{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-top:20px}
.doc-btn{padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:left;transition:all .2s;font-family:var(--font);color:var(--text);font-size:1em}
.doc-btn:hover{border-color:var(--accent);background:rgba(88,166,255,.05)}
.doc-btn .doc-title{font-weight:700;margin-bottom:4px}.doc-btn .doc-desc{font-size:.8em;color:var(--text-muted)}
.hidden{display:none!important}
.completion-pct{font-size:.75em;color:var(--green);margin-left:8px}
footer{text-align:center;padding:24px;color:var(--text-muted);font-size:.8em;border-top:1px solid var(--border);margin-top:40px}
.gap-item{padding:10px;background:var(--surface2);border-radius:var(--radius);margin-bottom:8px;border-left:3px solid var(--red)}
.gap-item .gap-id{font-weight:700;color:var(--accent)}.gap-item .gap-weight{float:right;color:var(--red);font-weight:700}
@media(max-width:600px){.control-row{flex-direction:column}.control-status{min-width:auto;width:100%}.control-id{min-width:auto}}
.start-over{position:fixed;bottom:20px;right:20px;z-index:50}
.save-indicator{font-size:.75em;color:var(--green);opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}
.note-toggle{font-size:.8em;color:var(--accent);cursor:pointer;margin-top:4px;display:inline-block}
.note-toggle:hover{text-decoration:underline}
.control-note{margin-top:6px;display:none}
.control-note.open{display:block}
.control-note textarea{width:100%;min-height:50px;padding:8px;font-size:.8em}

.auto-pop-hint{font-size:.8em;color:var(--text-muted);margin-top:4px;font-style:italic}
.tooltip-wrap{position:relative;display:inline-block}
.tooltip-wrap .tooltip-text{visibility:hidden;background:var(--surface);color:var(--text);padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.3);font-size:.8em;position:absolute;bottom:125%;left:50%;transform:translateX(-50%);white-space:nowrap;z-index:1000;opacity:0;transition:opacity .3s ease, visibility .3s ease;transition-delay:.2s;pointer-events:none;max-width:300px;white-space:normal}
.tooltip-wrap .tooltip-text::after{content:"";position:absolute;top:100%;left:50%;margin-left:-5px;border-width:5px;border-style:solid;border-color:var(--border) transparent transparent transparent}
.tooltip-wrap:hover .tooltip-text{visibility:visible;opacity:1;transition-delay:.2s}
.tooltip-wrap.active .tooltip-text{visibility:visible;opacity:1;transition-delay:0s}
@media(max-width:768px){
  .tooltip-wrap{-webkit-tap-highlight-color:transparent}
  .tooltip-wrap .tooltip-text{position:fixed;bottom:auto;top:auto;left:10px;right:10px;transform:none;max-width:none;margin-top:10px}
}
.landing-page{text-align:center;padding:60px 20px;max-width:800px;margin:0 auto}
.hero-title{font-size:3.2em;font-weight:800;margin-bottom:16px;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:1.3em;color:var(--text-muted);margin-bottom:32px;line-height:1.5}
.hero-features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:40px 0;text-align:left}
.feature-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.feature-icon{font-size:2em;margin-bottom:12px}
.feature-title{font-weight:700;margin-bottom:8px;color:var(--accent)}
.start-btn{background:var(--green);color:#000;padding:16px 40px;font-size:1.1em;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;transition:all .3s;margin-top:20px}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(63,185,80,.3)}
.branding{margin-top:60px;padding-top:40px;border-top:1px solid var(--border);color:var(--text-muted);font-size:.9em}
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:24px 0}
.dashboard-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:relative}
.dashboard-card h3{margin-top:0;color:var(--accent);margin-bottom:16px}
.chart-container{position:relative;height:300px;width:100%}
.score-circle{position:relative;width:200px;height:200px;margin:0 auto}
.risk-heatmap{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:16px}
.risk-item{padding:12px;border-radius:var(--radius);text-align:center;font-size:.9em;font-weight:600}
.risk-high{background:rgba(248,81,73,.2);border:1px solid var(--red);color:var(--red)}
.risk-medium{background:rgba(210,153,34,.2);border:1px solid var(--yellow);color:var(--yellow)}
.risk-low{background:rgba(63,185,80,.2);border:1px solid var(--green);color:var(--green)}
.dashboard-summary{text-align:center;margin-bottom:24px}
.summary-score{font-size:4em;font-weight:800;line-height:1;margin-bottom:8px}
.summary-label{font-size:1.2em;color:var(--text-muted)}
.poam-section{margin-top:32px;padding-top:24px;border-top:1px solid var(--border)}
.poam-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;border-left:4px solid var(--red)}
.poam-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.poam-id{font-weight:700;color:var(--accent);font-size:.9em}
.poam-risk{font-size:.75em;padding:4px 8px;border-radius:12px;font-weight:600}
.poam-risk.high{background:var(--red);color:#fff}
.poam-risk.medium{background:var(--yellow);color:#000}
.poam-risk.low{background:var(--green);color:#000}
.poam-desc{font-size:.9em;color:var(--text-muted);margin-bottom:8px}
.poam-action{font-size:.85em;color:var(--text)}
.download-section{text-align:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--border)}
@media(max-width:768px){
  .hero-title{font-size:2.5em}
  .dashboard-grid{grid-template-columns:1fr}
  .hero-features{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
  .nav-buttons{flex-direction:column;gap:8px}
  .nav-buttons .btn{width:100%}
  .container{padding:15px}
  .risk-heatmap{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}
  .poam-header{flex-direction:column;align-items:flex-start;gap:8px}
}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state-icon{font-size:3em;margin-bottom:16px;opacity:0.5}
.loading-spinner{
  width:20px;height:20px;
  border:2px solid var(--border);
  border-top:2px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:inline-block;
  margin-right:8px;
}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.phase-transition{transition:transform 0.3s ease, opacity 0.3s ease}
.btn.loading{opacity:0.7;cursor:not-allowed}
.btn.loading:before{content:'';display:inline-block;margin-right:8px}
</style>
</head>
<body>
<header id="mainHeader"><div class="container"><div><div class="logo" id="headerLogo">🛡️ Cyber Ops — <span>CMMC SSP Builder</span></div><div class="brand-sub">By <a href="https://mirzayanllc.com/" target="_blank">Mirzayan LLC</a></div></div><div id="headerControls" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><div id="levelSwitch" style="display:none;gap:8px;margin-right:12px;"></div><span class="save-indicator" id="saveIndicator">✓ Saved</span><button class="btn btn-danger start-over" onclick="startOver()">Start Over</button></div></div></header>
<div class="progress-bar"><div class="container"><div class="progress-track"><div class="progress-fill" id="progressFill"></div></div><div class="phase-labels" id="phaseLabels"></div></div></div>
<div class="container" id="app"></div>
<footer>© 2026 <a href="https://mirzayanllc.com/" target="_blank">Mirzayan LLC</a> — CMMC Level 2 SSP Builder. All assessment data stays in your browser.</footer>

<script>
// ============================================================
// DATA: All 110 NIST 800-171 Rev 2 controls
// ============================================================
// CMMC Level 1 Controls (17 FAR 52.204-21 practices)
const LEVEL1_CONTROLS = [
{id:"AC.L1-3.1.1",family:"AC",title:"Authorized Access Control",desc:"Limit system access to authorized users, processes acting on behalf of authorized users, and devices (including other systems).",weight:1},
{id:"AC.L1-3.1.2",family:"AC",title:"Transaction & Function Control",desc:"Limit system access to the types of transactions and functions that authorized users are permitted to execute.",weight:1},
{id:"AC.L1-3.1.20",family:"AC",title:"External Connections",desc:"Verify and control/limit connections to and use of external systems.",weight:1},
{id:"AC.L1-3.1.22",family:"AC",title:"Publicly Accessible Content",desc:"Control information posted or processed on publicly accessible systems.",weight:1},
{id:"IA.L1-3.5.1",family:"IA",title:"Identification",desc:"Identify system users, processes acting on behalf of users, and devices.",weight:1},
{id:"IA.L1-3.5.2",family:"IA",title:"Authentication",desc:"Authenticate (or verify) the identities of users, processes, or devices, as a prerequisite to allowing access to organizational systems.",weight:1},
{id:"MP.L1-3.8.3",family:"MP",title:"Media Sanitization",desc:"Sanitize or destroy system media containing FCI before disposal or release for reuse.",weight:1},
{id:"PE.L1-3.10.1",family:"PE",title:"Physical Access Limitation",desc:"Limit physical access to organizational systems, equipment, and the respective operating environments to authorized individuals.",weight:1},
{id:"PE.L1-3.10.3",family:"PE",title:"Escort Visitors",desc:"Escort visitors and monitor visitor activity.",weight:1},
{id:"PE.L1-3.10.4",family:"PE",title:"Physical Access Logs",desc:"Maintain audit logs of physical access.",weight:1},
{id:"PE.L1-3.10.5",family:"PE",title:"Physical Access Devices",desc:"Control and manage physical access devices.",weight:1},
{id:"SC.L1-3.13.1",family:"SC",title:"Boundary Protection",desc:"Monitor, control, and protect communications (i.e., information transmitted or received by organizational systems) at the external boundaries and key internal boundaries of organizational systems.",weight:1},
{id:"SC.L1-3.13.5",family:"SC",title:"Public-Access System Separation",desc:"Implement subnetworks for publicly accessible system components that are physically or logically separated from internal networks.",weight:1},
{id:"SI.L1-3.14.1",family:"SI",title:"Flaw Remediation",desc:"Identify, report, and correct system flaws in a timely manner.",weight:1},
{id:"SI.L1-3.14.2",family:"SI",title:"Malicious Code Protection",desc:"Provide protection from malicious code at designated locations within organizational systems.",weight:1},
{id:"SI.L1-3.14.4",family:"SI",title:"Update Malicious Code Protection",desc:"Update malicious code protection mechanisms when new releases are available.",weight:1},
{id:"SI.L1-3.14.5",family:"SI",title:"System & File Scanning",desc:"Perform periodic scans of organizational systems and real-time scans of files from external sources as files are downloaded, opened, or executed.",weight:1}
];

const CONTROLS = [
// ACCESS CONTROL (AC) — 22
{id:"AC.L2-3.1.1",family:"AC",title:"Authorized Access Control",desc:"Limit system access to authorized users, processes acting on behalf of authorized users, and devices (including other systems).",weight:5},
{id:"AC.L2-3.1.2",family:"AC",title:"Transaction & Function Control",desc:"Limit system access to the types of transactions and functions that authorized users are permitted to execute.",weight:5},
{id:"AC.L2-3.1.3",family:"AC",title:"CUI Flow Control",desc:"Control the flow of CUI in accordance with approved authorizations.",weight:1},
{id:"AC.L2-3.1.4",family:"AC",title:"Separation of Duties",desc:"Separate the duties of individuals to reduce the risk of malevolent activity without collusion.",weight:1},
{id:"AC.L2-3.1.5",family:"AC",title:"Least Privilege",desc:"Employ the principle of least privilege, including for specific security functions and privileged accounts.",weight:3},
{id:"AC.L2-3.1.6",family:"AC",title:"Non-Privileged Account Use",desc:"Use non-privileged accounts or roles when accessing nonsecurity functions.",weight:1},
{id:"AC.L2-3.1.7",family:"AC",title:"Privileged Functions",desc:"Prevent non-privileged users from executing privileged functions and capture the execution of such functions in audit logs.",weight:1},
{id:"AC.L2-3.1.8",family:"AC",title:"Unsuccessful Logon Attempts",desc:"Limit unsuccessful logon attempts.",weight:1},
{id:"AC.L2-3.1.9",family:"AC",title:"Privacy & Security Notices",desc:"Provide privacy and security notices consistent with applicable CUI rules.",weight:1},
{id:"AC.L2-3.1.10",family:"AC",title:"Session Lock",desc:"Use session lock with pattern-hiding displays to prevent access and viewing of data after a period of inactivity.",weight:1},
{id:"AC.L2-3.1.11",family:"AC",title:"Session Termination",desc:"Terminate (automatically) a user session after a defined condition.",weight:1},
{id:"AC.L2-3.1.12",family:"AC",title:"Remote Access Control",desc:"Monitor and control remote access sessions.",weight:5},
{id:"AC.L2-3.1.13",family:"AC",title:"Remote Access Encryption",desc:"Employ cryptographic mechanisms to protect the confidentiality of remote access sessions.",weight:5},
{id:"AC.L2-3.1.14",family:"AC",title:"Remote Access Routing",desc:"Route remote access via managed access control points.",weight:1},
{id:"AC.L2-3.1.15",family:"AC",title:"Privileged Remote Access",desc:"Authorize remote execution of privileged commands and remote access to security-relevant information.",weight:1},
{id:"AC.L2-3.1.16",family:"AC",title:"Wireless Access Authorization",desc:"Authorize wireless access prior to allowing such connections.",weight:5},
{id:"AC.L2-3.1.17",family:"AC",title:"Wireless Access Protection",desc:"Protect wireless access using authentication and encryption.",weight:5},
{id:"AC.L2-3.1.18",family:"AC",title:"Mobile Device Connection",desc:"Control connection of mobile devices.",weight:5},
{id:"AC.L2-3.1.19",family:"AC",title:"Encrypt CUI on Mobile",desc:"Encrypt CUI on mobile devices and mobile computing platforms.",weight:3},
{id:"AC.L2-3.1.20",family:"AC",title:"External Connections",desc:"Verify and control/limit connections to and use of external systems.",weight:1},
{id:"AC.L2-3.1.21",family:"AC",title:"Portable Storage Use",desc:"Limit use of portable storage devices on external systems.",weight:1},
{id:"AC.L2-3.1.22",family:"AC",title:"Publicly Accessible Content",desc:"Control information posted or processed on publicly accessible systems.",weight:1},
// AWARENESS & TRAINING (AT) — 3
{id:"AT.L2-3.2.1",family:"AT",title:"Security Awareness",desc:"Ensure that managers, systems administrators, and users of organizational systems are made aware of the security risks associated with their activities and of the applicable policies, standards, and procedures related to the security of those systems.",weight:5},
{id:"AT.L2-3.2.2",family:"AT",title:"Role-Based Training",desc:"Ensure that personnel are trained to carry out their assigned information security-related duties and responsibilities.",weight:5},
{id:"AT.L2-3.2.3",family:"AT",title:"Insider Threat Awareness",desc:"Provide security awareness training on recognizing and reporting potential indicators of insider threat.",weight:1},
// AUDIT & ACCOUNTABILITY (AU) — 9
{id:"AU.L2-3.3.1",family:"AU",title:"System Auditing",desc:"Create and retain system audit logs and records to the extent needed to enable the monitoring, analysis, investigation, and reporting of unlawful or unauthorized system activity.",weight:5},

const PHASE_NAMES = ["Welcome","Organization","Technical","Policies","Controls","Results","Documents"];
const STATUS_OPTIONS = [{v:"implemented",l:"✅ Implemented"},{v:"partial",l:"🟡 Partial"},{v:"not_implemented",l:"❌ Not Implemented"},{v:"inherited",l:"🔄 Inherited"},{v:"na",l:"⬜ N/A"}];

const _defaultState={phase:-1,screeningPhase:0,selectedLevel:null,p0:{},p1:{},p2a:{},p2b:{},p2c:{},p2d:{},p2e:{},p2f:{},p2g:{},p3:{},controls:{},controlsL1:{},controlsL2:{},controlNotes:{},manuallySetControls:{},searchFilter:""};
const _saved=JSON.parse(localStorage.getItem('cmmc_state')||'null');
let state;
if(_saved&&_saved.phase>=0){
  const phaseDisplay = _saved.phase === -1 ? 'Landing' : PHASE_NAMES[_saved.phase + 1] || `Phase ${_saved.phase + 2}`;
  if(confirm(`Resume previous session? (${phaseDisplay})\n\nClick Cancel to start fresh.`)){state=_saved}
  else{localStorage.removeItem('cmmc_state');state={..._defaultState}}
}else{state=_saved||{..._defaultState}}
function save(){localStorage.setItem('cmmc_state',JSON.stringify(state));const ind=document.getElementById('saveIndicator');if(ind){ind.classList.add('show');clearTimeout(window._saveTm);window._saveTm=setTimeout(()=>ind.classList.remove('show'),2000)}}

// Browser History Management
function pushHistory(phase, screeningPhase = null) {
  const stateObj = { phase, screeningPhase };
  const url = `${window.location.pathname}${window.location.search}#phase-${phase}${screeningPhase !== null ? `-screening-${screeningPhase}` : ''}`;
  window.history.pushState(stateObj, '', url);
}

function savePhaseData() {
  // Auto-save current phase data before navigating
  save();
  return true;
}

function confirmNavigation() {
  const isEmpty = checkPhaseEmpty(state.phase);
  if (isEmpty && (state.phase === 2 || state.phase === 3)) {
    return confirm('You have unsaved changes. Navigate away anyway?');
  }
  return true;
}

window.addEventListener('popstate', function(event) {
  if (event.state) {
    if (event.state.screeningPhase !== null) {
      state.screeningPhase = event.state.screeningPhase;
    }
    if (event.state.phase !== null) {
      state.phase = event.state.phase;
    }
    save();
    render();
  }
});
function startOver(){if(confirm('Are you sure? This will erase all progress and data.\n\nThis action cannot be undone.')){localStorage.removeItem('cmmc_state');state={phase:-1,screeningPhase:0,selectedLevel:null,p0:{},p1:{},p2a:{},p2b:{},p2c:{},p2d:{},p2e:{},p2f:{},p2g:{},p3:{},controls:{},controlsL1:{},controlsL2:{},controlNotes:{},manuallySetControls:{},searchFilter:""};pushHistory(-1,0);render()}}
function checkPhaseEmpty(phase){
  if(phase===1){
    const subs=[state.p2a,state.p2b,state.p2c,state.p2d,state.p2e,state.p2f,state.p2g];
    const filled=subs.some(s=>Object.values(s).some(v=>v&&(Array.isArray(v)?v.length>0:v!=='')));
    return !filled;
  }
  if(phase===2){
    const vals=Object.values(state.p3);
    return vals.length===0||vals.every(v=>!v||v==='');
  }
  return false;
}
function goPhase(n){
  const cur=state.phase;
  
  // Save current phase data first
  if (!savePhaseData()) return;
  
  // Navigation confirmation for empty phases
  if(n>cur&&(cur===1||cur===2)&&checkPhaseEmpty(cur)){
    if(!confirmNavigation())return;
  }
  
  state.phase=n;
  pushHistory(n);
  save();
  render();
}
function $(s,p){return(p||document).querySelector(s)}
function $$(s,p){return[...(p||document).querySelectorAll(s)]}

// AUTO-POPULATE LOGIC
// ============================================================
function autoPopulate(){
  const c = state.controls;
  const manual = state.manuallySetControls || {};
  const {p2a,p2b,p2c,p2d,p2e,p2f,p2g,p3} = state;
  
  // Only auto-populate controls that haven't been manually set
  function setControl(id, value) {
    if (!manual[id]) {
      c[id] = value;
    }
  }
  
  // MFA
  if(p2a.mfa && p2a.mfa.includes('all users')){setControl('IA.L2-3.5.3','implemented')}
  else if(p2a.mfa && p2a.mfa.includes('privileged users')){setControl('IA.L2-3.5.3','partial')}
  else if(p2a.mfa && p2a.mfa.includes('none')){setControl('IA.L2-3.5.3','not_implemented')}
  // Password complexity
  if(p2a.pwComplexity==='yes'&&parseInt(p2a.pwMinLen)>=12){setControl('IA.L2-3.5.7','implemented')}
  else if(p2a.pwComplexity==='yes'){setControl('IA.L2-3.5.7','partial')}
  // Identity provider
  if(p2a.idp&&p2a.idp!=='Other'){setControl('IA.L2-3.5.1','implemented');setControl('IA.L2-3.5.2','implemented')}
  // Account review
  if(p2a.acctReview==='monthly'||p2a.acctReview==='quarterly'){setControl('AC.L2-3.1.5','implemented');setControl('IA.L2-3.5.6','implemented')}
  else if(p2a.acctReview==='never'){setControl('IA.L2-3.5.6','not_implemented')}
  // EDR
  if(p2b.edr&&p2b.edr!=='None'){setControl('SI.L2-3.14.2','implemented');setControl('SI.L2-3.14.4','implemented');setControl('SI.L2-3.14.5','implemented')}
  else if(p2b.edr==='None'){setControl('SI.L2-3.14.2','not_implemented');setControl('SI.L2-3.14.5','not_implemented')}
  // Encryption
  if(p2b.encryption==='all devices'){setControl('MP.L2-3.8.6','implemented');setControl('SC.L2-3.13.16','implemented');setControl('AC.L2-3.1.19','implemented')}
  else if(p2b.encryption==='none'){setControl('MP.L2-3.8.6','not_implemented');setControl('SC.L2-3.13.16','not_implemented')}
  // Patch
  if(p2b.patchFreq==='weekly'||p2b.patchFreq==='monthly'){setControl('SI.L2-3.14.1','implemented')}
  else if(p2b.patchFreq==='ad-hoc'){setControl('SI.L2-3.14.1','partial')}
  // Asset inventory
  if(p2b.assetInv&&p2b.assetInv.toLowerCase()!=='none'&&p2b.assetInv!==''){setControl('CM.L2-3.4.1','implemented')}
  // Network seg
  if(p2c.netSeg==='yes'){setControl('SC.L2-3.13.5','implemented')}
  if(p2c.vpn==='yes'){setControl('AC.L2-3.1.13','implemented');setControl('AC.L2-3.1.14','implemented')}
  if(p2c.ids==='yes'){setControl('SI.L2-3.14.6','implemented')}
  else if(p2c.ids==='no'){setControl('SI.L2-3.14.6','not_implemented')}
  // SIEM
  if(p2d.siem&&p2d.siem.toLowerCase()!=='none'&&p2d.siem!==''){setControl('AU.L2-3.3.1','implemented');setControl('AU.L2-3.3.5','implemented');setControl('AU.L2-3.3.6','implemented')}
  else if(p2d.siem===''||p2d.siem==='None'){setControl('AU.L2-3.3.1','not_implemented');setControl('AU.L2-3.3.5','not_implemented')}
  if(p2d.logRetention==='1 year'||p2d.logRetention==='2+ years'){setControl('AU.L2-3.3.8','implemented')}
  if(p2d.alertTriage==='yes'){setControl('AU.L2-3.3.4','implemented')}
  // Vuln
  if(p2e.vulnScanner&&p2e.vulnScanner.toLowerCase()!=='none'&&p2e.vulnScanner!==''){setControl('RA.L2-3.11.2','implemented')}
  else{setControl('RA.L2-3.11.2','not_implemented')}
  if(p2e.patchSLA==='yes'){setControl('RA.L2-3.11.3','implemented')}
  if(p2e.cisBaselines==='yes'){setControl('CM.L2-3.4.2','implemented')}
  // IR
  if(p2f.irPlan==='yes'){setControl('IR.L2-3.6.1','implemented');setControl('IR.L2-3.6.2','implemented')}
  else if(p2f.irPlan==='no'){setControl('IR.L2-3.6.1','not_implemented');setControl('IR.L2-3.6.2','not_implemented')}
  if(p2f.irTest&&p2f.irTest!=='Never'&&p2f.irTest!==''){setControl('IR.L2-3.6.3','implemented')}
  else{setControl('IR.L2-3.6.3','not_implemented')}
  // Physical
  if(p2g.accessControls&&(p2g.accessControls.includes('badge/keycard')||p2g.accessControls.includes('biometric'))){setControl('PE.L2-3.10.1','implemented');setControl('PE.L2-3.10.5','implemented')}
  if(p2g.visitorLog==='yes'){setControl('PE.L2-3.10.3','implemented');setControl('PE.L2-3.10.4','implemented')}
  if(p2g.mediaSan==='yes'){setControl('MP.L2-3.8.3','implemented');setControl('MA.L2-3.7.3','implemented')}
  // Policies
  if(p3.secPolicies==='yes'){setControl('CA.L2-3.12.4','implemented')}
  if(p3.aup==='yes'){setControl('AT.L2-3.2.1','partial')}
  if(p3.accessPolicy==='yes'){setControl('AC.L2-3.1.1','implemented');setControl('AC.L2-3.1.2','implemented')}
  if(p3.irPolicy==='yes'&&p2f.irPlan==='yes'){setControl('IR.L2-3.6.1','implemented')}
  if(p3.training==='yes'){setControl('AT.L2-3.2.1','implemented');setControl('AT.L2-3.2.2','implemented');setControl('AT.L2-3.2.3','implemented')}
  if(p3.vendorRisk==='yes'){setControl('CA.L2-3.12.1','partial')}
  if(p3.poam==='yes'){setControl('CA.L2-3.12.2','implemented')}
  save();
}

  if(!selected) {
    alert('Please select an option');
    return;
  }
  
  if(selected.value === 'yes') {
    selectLevel(2);
  } else if(selected.value === 'fci_only') {
    selectLevel(1);
  } else {
    state.screeningPhase = 3;
    pushHistory(state.phase, state.screeningPhase);
    save();
    render();
  }
}

function goBackScreening(targetPhase) {
  state.screeningPhase = targetPhase;
  pushHistory(state.phase, state.screeningPhase);
  save();
  render();
}

function selectLevel(level) {
  state.selectedLevel = level;
  state.screeningPhase = 4;
  pushHistory(state.phase, state.screeningPhase);
  save();
  render();
}

function startAssessment(level) {
  state.selectedLevel = level;
  state.phase = 0;
  pushHistory(0);
  save();
  render();
}

function resetScreening() {
  state.screeningPhase = 0;
  state.selectedLevel = null;
  pushHistory(state.phase, 0);
  save();
  render();
}

function switchLevel(newLevel) {
  const currentLevel = state.selectedLevel;
  
  // Don't switch if already on that level
  if (currentLevel === newLevel) return;
  
  // Save current level data
  if (currentLevel === 1) {
    state.controlsL1 = {...state.controls};
  } else if (currentLevel === 2) {
    state.controlsL2 = {...state.controls};
  }
  
  if(confirm(`Switch to CMMC Level ${newLevel}? Your Level ${currentLevel} progress is saved.`)) {
    state.selectedLevel = newLevel;
    
    // Load saved data for new level
    if (newLevel === 1) {
      state.controls = {...(state.controlsL1 || {})};
    } else if (newLevel === 2) {
      state.controls = {...(state.controlsL2 || {})};
    }
    
    save();
    render();
  }
}

function calcScore(){
  let maxScore=0;let earned=0;
  const gaps=[];
  const controlSet = state.selectedLevel === 1 ? LEVEL1_CONTROLS : CONTROLS;
  controlSet.forEach(ctrl=>{
    const s=state.controls[ctrl.id];
    if(s==='na')return; // N/A excluded entirely
    maxScore+=ctrl.weight;
    if(!s||s==='not_implemented'){gaps.push(ctrl)}
    else if(s==='partial'){earned+=Math.floor(ctrl.weight/2);gaps.push(ctrl)}
    else{earned+=ctrl.weight} // implemented or inherited
  });
  
  // Score calculation differs by level
  let score;
  if(state.selectedLevel === 1) {
    // Level 1: Simple pass/fail (all 17 implemented = ready)
    const totalWeight=controlSet.reduce((a,c)=>a+c.weight,0);
    const naWeight=controlSet.filter(c=>state.controls[c.id]==='na').reduce((a,c)=>a+c.weight,0);
    const applicableMax=totalWeight-naWeight;
    score = applicableMax === earned ? 100 : Math.round((earned / applicableMax) * 100);
  } else {
    // Level 2: SPRS = 110 minus total weight lost
    const totalWeight=controlSet.reduce((a,c)=>a+c.weight,0);
    const naWeight=controlSet.filter(c=>state.controls[c.id]==='na').reduce((a,c)=>a+c.weight,0);
    const applicableMax=totalWeight-naWeight;
    const lost=applicableMax-earned;
    score=110-lost;
  }
  gaps.sort((a,b)=>b.weight-a.weight);
  const naCount = controlSet.filter(c=>state.controls[c.id]==='na').length;
  return{score,gaps,maxScore,naCount};
}

function render(){
  const app=$('#app');
  
  // Update header logo with current level
  const headerLogo = document.getElementById('headerLogo');
  if(headerLogo) {
    if(state.selectedLevel) {
      headerLogo.innerHTML = `🛡️ Cyber Ops — <span>CMMC Level ${state.selectedLevel} SSP Builder</span>`;
    } else {
      headerLogo.innerHTML = `🛡️ Cyber Ops — <span>CMMC SSP Builder</span>`;
    }
  }
  
  // Update level switch controls
  const levelSwitch = document.getElementById('levelSwitch');
  if(levelSwitch) {
    if(state.selectedLevel && state.phase >= 0) {
      levelSwitch.style.display = 'flex';
      const l1Active = state.selectedLevel === 1;
      const l2Active = state.selectedLevel === 2;
      levelSwitch.innerHTML = `
        <span style="font-size:0.8em;color:var(--text-muted);">Level:</span>
        <button class="btn ${l1Active ? 'btn-primary' : 'btn-secondary'}" 
                style="padding:4px 8px;font-size:0.8em;${l1Active ? 'opacity:1;' : ''}" 
                onclick="switchLevel(1)" 
                ${l1Active ? 'disabled' : ''}>L1</button>
        <button class="btn ${l2Active ? 'btn-primary' : 'btn-secondary'}" 
                style="padding:4px 8px;font-size:0.8em;${l2Active ? 'opacity:1;' : ''}" 
                onclick="switchLevel(2)" 
                ${l2Active ? 'disabled' : ''}>L2</button>
      `;
    } else {
      levelSwitch.style.display = 'none';
    }
  }
  
  const actualPhase = Math.max(0, state.phase + 1);
  const pct=Math.round((actualPhase/6)*100);
  $('#progressFill').style.width=pct+'%';
  
  // Hide progress bar and header controls on landing page
  const progressBar = document.querySelector('.progress-bar');
  const headerControls = document.getElementById('headerControls');
  if(state.phase === -1) {
    progressBar.style.display = 'none';
    if(headerControls) headerControls.style.display = 'none';
  } else {
    progressBar.style.display = 'block';
    if(headerControls) headerControls.style.display = 'flex';
    let labels='';
    PHASE_NAMES.slice(1).forEach((n,i)=>{  // Skip "Welcome" in progress labels
      const phaseIndex = i;
      const cls=phaseIndex<state.phase?'done':phaseIndex===state.phase?'active':'';
      const click=phaseIndex<state.phase?` onclick="savePhaseData()&&goPhase(${phaseIndex})" role="button" tabindex="0"`:'';
      labels+=`<span class="${cls}"${click}>${n}</span>`;
    });
    $('#phaseLabels').innerHTML=labels;
  }
  
  const renderers=[renderLanding,renderPhase1,renderPhase2,renderPhase3,renderPhase4,renderPhase5,renderPhase6];
  
  // Redirect to Level 1 assessment if Level 1 selected and at controls phase
  let phaseIndex = state.phase + 1;
  if(state.selectedLevel === 1 && state.phase === 3) {
    app.innerHTML='<div class="phase active">'+renderLevel1Assessment()+'</div>';
  } else {
    app.innerHTML='<div class="phase active">'+renderers[phaseIndex]()+'</div>';
  }
  bindEvents();
  
  // Render charts for dashboard
  if(state.phase === 4) {
    renderCharts();
  }
}

function yn(name,stateObj,key){
  const v=stateObj[key]||'';
  return`<div class="yn-group"><label><input type="radio" name="${name}" value="yes" ${v==='yes'?'checked':''}> Yes</label><label><input type="radio" name="${name}" value="no" ${v==='no'?'checked':''}> No</label></div>`;
}
function dd(name,opts,val){
  let h=`<select data-field="${name}"><option value="">— Select —</option>`;
  opts.forEach(o=>h+=`<option value="${o}" ${val===o?'selected':''}>${o}</option>`);
  return h+'</select>';
}
function ti(name,val,ph){return`<input type="text" data-field="${name}" value="${val||''}" placeholder="${ph||''}">`}
function ni(name,val,ph){return`<input type="number" data-field="${name}" value="${val||''}" placeholder="${ph||''}" min="0">`}
function cb(name,opts,vals){
  vals=vals||[];
  let h='<div class="checkbox-group">';
  opts.forEach(o=>h+=`<label><input type="checkbox" data-cbgroup="${name}" value="${o}" ${vals.includes(o)?'checked':''}> ${o}</label>`);
  return h+'</div>';
}

// Form validation function
function validateAndNext(currentPhase, nextPhase) {
  const requiredFields = getRequiredFields(currentPhase);
  const missingFields = [];
  
  requiredFields.forEach(field => {
    const value = getFieldValue(field);
    if (!value || (Array.isArray(value) && value.length === 0)) {
      missingFields.push(field.label);
    }
  });
  
  if (missingFields.length > 0) {
    const proceed = confirm(`Some required fields are empty:\n\n${missingFields.join('\n')}\n\nProceed anyway?`);
    if (!proceed) return;
  }
  
  // Smooth transition
  const currentPhaseEl = document.querySelector('.phase.active');
  if (currentPhaseEl) {
    currentPhaseEl.style.transform = 'translateX(-20px)';
    currentPhaseEl.style.opacity = '0.8';
    setTimeout(() => goPhase(nextPhase), 150);
  } else {
    goPhase(nextPhase);
  }
}

function getRequiredFields(phase) {
  const required = {
    0: [
      { field: 'legalName', label: 'Legal Business Name' },
      { field: 'empCount', label: 'Employee Count' }
    ],
    1: [], // Optional technical details
    2: [] // Optional policy information
  };
  return required[phase] || [];
}

function getFieldValue(fieldDef) {
  const field = fieldDef.field;
  if (state.p0[field] !== undefined) return state.p0[field];
  if (state.p1[field] !== undefined) return state.p1[field];
  if (state.p2a[field] !== undefined) return state.p2a[field];
  if (state.p3[field] !== undefined) return state.p3[field];
  return null;
}

function generatePOAMSection(){
  const{gaps}=calcScore();
  const poamItems = gaps.filter(g => {
    const status = state.controls[g.id];
    return status === 'partial' || status === 'not_implemented' || !status;
  });
  
  if(poamItems.length === 0) {
    return `<div class="poam-section">
      <h3>Plan of Action & Milestones (POA&M)</h3>
      <div style="text-align:center;color:var(--green);padding:20px;">
        🎉 All controls are implemented! No POA&M items required.
      </div>
    </div>`;
  }
  
  let h = `<div class="poam-section">
    <h3>Auto-Generated POA&M (${poamItems.length} items)</h3>
    <p style="color:var(--text-muted);font-size:.9em;margin-bottom:20px;">
      Plan of Action & Milestones for controls marked as Partially Implemented or Not Implemented
    </p>`;
  
  poamItems.forEach((item, index) => {
    const status = state.controls[item.id];
    const riskLevel = item.weight >= 5 ? 'high' : item.weight >= 3 ? 'medium' : 'low';
    const riskText = riskLevel.toUpperCase();
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + (item.weight >= 5 ? 90 : 180)); // High risk: 90 days, others: 180 days
    
    const weakness = status === 'partial' ? 'Partially implemented — gaps remain' : 'Not implemented';
    const action = getRecommendedAction(item.family, item.id);
    
    h += `<div class="poam-item">
      <div class="poam-header">
        <div class="poam-id">${item.id}</div>
        <div class="poam-risk ${riskLevel}">${riskText}</div>
      </div>
      <div class="poam-desc"><strong>${item.title}</strong></div>
      <div class="poam-desc">Weakness: ${weakness}</div>
      <div class="poam-action">Recommended Action: ${action}</div>
      <div class="poam-action">Target Date: ${targetDate.toLocaleDateString()}</div>
      <div class="poam-action">Responsible Party: <span style="color:var(--text-muted);">[To be assigned]</span></div>
    </div>`;
  });
  
  h += `</div>`;
  return h;
}

function getRecommendedAction(family, controlId) {
  const actions = {
    AC: 'Implement access control policies, configure user permissions, and establish least privilege principles',
    AT: 'Develop security awareness training program and conduct regular training sessions',
    AU: 'Deploy logging solution, configure audit policies, and establish log review procedures',
    CM: 'Establish configuration baselines, implement change management process, and maintain asset inventory',
    IA: 'Configure multi-factor authentication, implement strong password policies, and establish identity management',
    IR: 'Develop incident response plan, establish IR team, and conduct tabletop exercises',
    MA: 'Document maintenance procedures, implement maintenance controls, and establish approval processes',
    MP: 'Implement media protection controls, configure encryption, and establish sanitization procedures',
    PS: 'Establish personnel screening procedures and implement termination/transfer processes',
    PE: 'Implement physical access controls, install monitoring systems, and establish visitor management',
    RA: 'Conduct risk assessments, implement vulnerability scanning, and establish remediation procedures',
    CA: 'Establish security assessment procedures, implement continuous monitoring, and maintain POA&M tracking',
    SC: 'Implement boundary protection, configure encryption, and establish network security controls',

function renderCharts(){
  // Status donut chart
  setTimeout(() => {
    const canvas = document.getElementById('statusChart');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      const controlSet = state.selectedLevel === 1 ? LEVEL1_CONTROLS : CONTROLS;
      
      let impl=0,partial=0,notImpl=0,inherited=0,naCount=0;
      controlSet.forEach(c=>{
        const s=state.controls[c.id];
        if(s==='implemented')impl++;
        else if(s==='partial')partial++;
        else if(s==='inherited')inherited++;
        else if(s==='na')naCount++;
        else notImpl++;
      });
      
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Implemented', 'Partial', 'Not Implemented', 'Inherited', 'N/A'],
          datasets: [{
            data: [impl, partial, notImpl, inherited, naCount],
            backgroundColor: ['#3fb950', '#d29922', '#f85149', '#bc8cff', '#8b949e'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#e6edf3', font: { size: 12 } }
            }
          }
        }
      });
    }
    
    // Risk heatmap
    const heatmapEl = document.getElementById('riskHeatmap');
    if (heatmapEl) {
      const controlSet = state.selectedLevel === 1 ? LEVEL1_CONTROLS : CONTROLS;
      const familiesInUse = [...new Set(controlSet.map(c => c.family))];
      
      let heatmapHTML = '';
      familiesInUse.forEach(fk => {
        const fc = controlSet.filter(c => c.family === fk);
        const issues = fc.filter(c => {
          const s = state.controls[c.id];
          return s === 'not_implemented' || s === 'partial' || !s;
        });
        const riskLevel = issues.length >= 3 ? 'high' : issues.length >= 1 ? 'medium' : 'low';
        const riskClass = `risk-${riskLevel}`;
        heatmapHTML += `<div class="risk-item ${riskClass}">
          <div>${fk}</div>
          <div style="font-size:0.8em;margin-top:4px;">${issues.length}/${fc.length} gap(s)</div>
        </div>`;
      });
      heatmapEl.innerHTML = heatmapHTML;
    }
  }, 100);
}

function bindEvents(){
  // Map phase → state key prefix
  const phaseMap={0:'p0',1:'p1',3:'p3'};
  // Text/select/number/date inputs
  $$('[data-field]').forEach(el=>{
    el.addEventListener('change',()=>{
      const field=el.dataset.field;
      // Determine which state object
      let target=getStateTarget(field);
      if(target)target[field]=el.value;
      save();
    });
    el.addEventListener('input',()=>{
      const field=el.dataset.field;
      let target=getStateTarget(field);
      if(target)target[field]=el.value;
      save();
    });
  });
  // Radio buttons
  $$('input[type=radio]').forEach(el=>{
    el.addEventListener('change',()=>{
      const name=el.name;
      const val=el.value;
      if(name==='handlesCUI'){state.p0.handlesCUI=val;save();render();return}
      if(name.startsWith('cui')){state.p0[name]=val;save();return}
      if(name==='goal'){state.p0.goal=val;save();return}
      // yn fields
      const ynMap={dodContractor:'p0',bidding:'p0',cageSam:'p0',useMSP:'p1',
        pwComplexity:'p2a',netSeg:'p2c',vpn:'p2c',ids:'p2c',alertTriage:'p2d',
        patchSLA:'p2e',cisBaselines:'p2e',irPlan:'p2f',irTeam:'p2f',breachNotif:'p2f',
        visitorLog:'p2g',mediaSan:'p2g'};
      if(name.startsWith('p3_')){state.p3[name.slice(3)]=val;save();return}
      if(ynMap[name]){state[ynMap[name]][name]=val;save();if(name==='useMSP')render();return}
    });
  });
  // Checkbox groups
  $$('[data-cbgroup]').forEach(el=>{
    el.addEventListener('change',()=>{
      const group=el.dataset.cbgroup;
      const checked=[...document.querySelectorAll(`[data-cbgroup="${group}"]:checked`)].map(e=>e.value);
      let target=getCBTarget(group);
      if(target)target.obj[target.key]=checked;
      save();
    });
  });
  // Control selects
  $$('[data-control]').forEach(el=>{
    el.addEventListener('change',()=>{
      const controlId = el.dataset.control;
      state.controls[controlId] = el.value;
      
      // Track manually set controls
      if (!state.manuallySetControls) state.manuallySetControls = {};
      state.manuallySetControls[controlId] = true;
      
      save();
    });
  });
  // Control notes
  $$('[data-note]').forEach(el=>{
    el.addEventListener('input',()=>{if(!state.controlNotes)state.controlNotes={};state.controlNotes[el.dataset.note]=el.value;save()});
  });
  // Search
  const searchEl=$('#ctrlSearch');
  if(searchEl){
    searchEl.addEventListener('input',()=>{
      const q=searchEl.value.toLowerCase();
      state.searchFilter=q;
      $$('.control-row').forEach(row=>{
        row.style.display=row.dataset.ctrlSearch.includes(q)?'':'none';
      });
      // Open families that have visible controls
      if(q){$$('.control-family').forEach(f=>{
        const vis=f.querySelectorAll('.control-row[style=""],.control-row:not([style])');
        const hasVis=[...f.querySelectorAll('.control-row')].some(r=>r.style.display!=='none');
        if(hasVis)f.classList.add('open');else f.classList.remove('open');
      })}
    });
  }
  
  // Enhanced tooltip functionality for mobile
  $$('.tooltip-wrap').forEach(el=>{
    // Mobile tap support
    el.addEventListener('touchstart',e=>{
      e.preventDefault();
      // Close other tooltips
      $$('.tooltip-wrap.active').forEach(other=>{
        if(other!==el)other.classList.remove('active');
      });
      // Toggle current tooltip
      el.classList.toggle('active');
    });
    
    // Desktop hover with delay
    let hoverTimeout;
    el.addEventListener('mouseenter',()=>{
      clearTimeout(hoverTimeout);
      hoverTimeout=setTimeout(()=>{
        $$('.tooltip-wrap.active').forEach(other=>other.classList.remove('active'));
        el.classList.add('active');
      },200);
    });
    
    el.addEventListener('mouseleave',()=>{
      clearTimeout(hoverTimeout);
      el.classList.remove('active');
    });
  });
  
  // Close tooltips when clicking elsewhere
  document.addEventListener('touchstart',e=>{
    if(!e.target.closest('.tooltip-wrap')){
      $$('.tooltip-wrap.active').forEach(el=>el.classList.remove('active'));
    }
  });
}

function getStateTarget(field){
  // Phase 2 sub-sections
  const p2aFields=['idp','pwMinLen','pwComplexity','pwRotation','privAccess','acctReview'];
  const p2bFields=['edr','encryption','patchTool','patchFreq','assetInv'];
  const p2cFields=['firewall','remoteAccess','emailSec'];
  const p2dFields=['siem','logRetention','logReview'];
  const p2eFields=['vulnScanner','scanFreq'];
  const p2fFields=['irTest'];
  const p2gFields=['disposal'];
  if(p2aFields.includes(field))return state.p2a;
  if(p2bFields.includes(field))return state.p2b;
  if(p2cFields.includes(field))return state.p2c;
  if(p2dFields.includes(field))return state.p2d;
  if(p2eFields.includes(field))return state.p2e;
  if(p2fFields.includes(field))return state.p2f;
  if(p2gFields.includes(field))return state.p2g;
  // Phase 1
  const p1Fields=['legalName','empCount','itUsers','locations','bizFunc','mspName','cuiEntry','cuiProcess','cuiStore','cuiExit','netSep'];
  if(p1Fields.includes(field))return state.p1;
  return null;
}
function getCBTarget(group){
  const map={mfa:{obj:state.p2a,key:'mfa'},endpointTypes:{obj:state.p2b,key:'endpointTypes'},
    accessControls:{obj:state.p2g,key:'accessControls'},cuiTypes:{obj:state.p1,key:'cuiTypes'},
    cuiStorage:{obj:state.p1,key:'cuiStorage'}};
  return map[group]||null;
}

function dl(filename,content){
  const blob=new Blob([content],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

function genExecSummary(){
  const{score,gaps}=calcScore();
  const org=state.p1.legalName||'[Organization]';
  const risk=score>=80?'LOW':score>=50?'MODERATE':'HIGH';
  let md=`# CMMC Level 2 — Executive Summary\n\n**Organization:** ${org}\n**Date:** ${new Date().toLocaleDateString()}\n**Assessment Goal:** ${state.p0.goal||'N/A'}\n\n---\n\n## SPRS Score: ${score} / 110\n\n**Risk Level:** ${risk}\n\n`;
  md+=`## Compliance Overview\n\n`;
  let impl=0,partial=0,notImpl=0,inherited=0,naC=0;
  CONTROLS.forEach(c=>{const s=state.controls[c.id];if(s==='implemented')impl++;else if(s==='partial')partial++;else if(s==='inherited')inherited++;else if(s==='na')naC++;else notImpl++});
  md+=`- Implemented: ${impl}\n- Partially Implemented: ${partial}\n- Not Implemented: ${notImpl}\n- Inherited: ${inherited}\n- Not Applicable: ${naC}\n\n`;
  md+=`## Top Gaps\n\n`;
  gaps.slice(0,5).forEach(g=>{md+=`- **${g.id}** — ${g.title} (Weight: ${g.weight})\n  ${g.desc}\n\n`});
  md+=`## Recommendations\n\n`;
  if(gaps.length>0){
    md+=`1. Prioritize remediation of high-weight controls listed above\n`;
    md+=`2. Develop POA&M items for all non-implemented controls\n`;
    md+=`3. Engage security team to address gaps before C3PAO assessment\n`;
    md+=`4. Implement continuous monitoring to maintain compliance posture\n`;
  }else{md+=`All controls are implemented. Maintain current posture and prepare for C3PAO assessment.\n`}
  md+=`\n---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

function genSSP(){
  const o=state.p1;const{score}=calcScore();
  const level = state.selectedLevel || 2;
  const controlSet = level === 1 ? LEVEL1_CONTROLS : CONTROLS;
  const standardRef = level === 1 ? 'FAR 52.204-21' : 'NIST SP 800-171 Rev 2';
  let md=`# System Security Plan (SSP)\n## CMMC Level ${level} — ${standardRef}\n\n`;
  md+=`**Organization:** ${o.legalName||'[TBD]'}\n**Date:** ${new Date().toLocaleDateString()}\n**SPRS Score:** ${score}\n\n---\n\n`;
  md+=`## 1. System Identification\n\n- **Organization:** ${o.legalName||'[TBD]'}\n- **Employees:** ${o.empCount||'[TBD]'}\n- **IT Users:** ${o.itUsers||'[TBD]'}\n- **Locations:** ${o.locations||'[TBD]'}\n- **Primary Function:** ${o.bizFunc||'[TBD]'}\n- **MSP/MSSP:** ${o.useMSP==='yes'?(o.mspName||'Yes'):'No'}\n\n`;
  md+=`## 2. CUI Boundary\n\n- **CUI Types:** ${(o.cuiTypes||[]).join(', ')||'[TBD]'}\n- **Storage:** ${(o.cuiStorage||[]).join(', ')||'[TBD]'}\n- **Entry Points:** ${o.cuiEntry||'[TBD]'}\n- **Processing:** ${o.cuiProcess||'[TBD]'}\n- **Storage Locations:** ${o.cuiStore||'[TBD]'}\n- **Exit Points:** ${o.cuiExit||'[TBD]'}\n- **Network Separation:** ${o.netSep||'[TBD]'}\n\n`;
  md+=`## 3. Technical Environment\n\n`;
  md+=`### Identity & Access Management\n- Identity Provider: ${state.p2a.idp||'[TBD]'}\n- MFA: ${(state.p2a.mfa||[]).join(', ')||'[TBD]'}\n- Password Min Length: ${state.p2a.pwMinLen||'[TBD]'}\n- Account Review: ${state.p2a.acctReview||'[TBD]'}\n\n`;
  md+=`### Endpoint Security\n- Types: ${(state.p2b.endpointTypes||[]).join(', ')||'[TBD]'}\n- EDR: ${state.p2b.edr||'[TBD]'}\n- Encryption: ${state.p2b.encryption||'[TBD]'}\n- Patching: ${state.p2b.patchFreq||'[TBD]'}\n\n`;
  md+=`### Network Security\n- Firewall: ${state.p2c.firewall||'[TBD]'}\n- Segmentation: ${state.p2c.netSeg||'[TBD]'}\n- VPN: ${state.p2c.vpn||'[TBD]'}\n- IDS/IPS: ${state.p2c.ids||'[TBD]'}\n\n`;
  md+=`### Logging & Monitoring\n- SIEM: ${state.p2d.siem||'[TBD]'}\n- Log Retention: ${state.p2d.logRetention||'[TBD]'}\n- Log Review: ${state.p2d.logReview||'[TBD]'}\n\n`;
  md+=`## 4. Control Implementation\n\n`;
  const familiesInUse = [...new Set(controlSet.map(c => c.family))];
  familiesInUse.forEach(fk=>{
    md+=`### ${FAMILIES[fk]} (${fk})\n\n`;
    controlSet.filter(c=>c.family===fk).forEach(c=>{
      const s=state.controls[c.id]||'Not Assessed';
      const statusLabel=STATUS_OPTIONS.find(o=>o.v===s)?.l||'Not Assessed';
      const note=state.controlNotes&&state.controlNotes[c.id]||'';
      md+=`**${c.id} — ${c.title}**\nRequirement: ${c.desc}\nStatus: ${statusLabel}\n`;
      if(note)md+=`Implementation Notes: ${note}\n`;
      md+=`\n`;
    });
  });
  md+=`---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

function genMatrix(){
  const level = state.selectedLevel || 2;
  const controlSet = level === 1 ? LEVEL1_CONTROLS : CONTROLS;
  const standardRef = level === 1 ? 'FAR 52.204-21' : 'NIST SP 800-171 Rev 2';
  let md=`# Control Compliance Matrix\n## CMMC Level ${level} — ${standardRef}\n\n**Date:** ${new Date().toLocaleDateString()}\n\n`;
  md+=`| Control ID | Title | Status | Weight |\n|---|---|---|---|\n`;
  controlSet.forEach(c=>{
    const s=state.controls[c.id]||'Not Assessed';
    const label=STATUS_OPTIONS.find(o=>o.v===s)?.l||'Not Assessed';
    md+=`| ${c.id} | ${c.title} | ${label} | ${c.weight} |\n`;
  });
  md+=`\n---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

function genSPRS(){
  const{score}=calcScore();
  let md=`# SPRS Score Report\n\n**Organization:** ${state.p1.legalName||'[TBD]'}\n**Date:** ${new Date().toLocaleDateString()}\n**Total Score:** ${score} / 110\n\n---\n\n`;
  Object.keys(FAMILIES).forEach(fk=>{
    const fc=CONTROLS.filter(c=>c.family===fk);
    let maxPts=fc.reduce((a,c)=>a+c.weight,0);
    let lost=0;
    fc.forEach(c=>{
      const s=state.controls[c.id];
      if(!s||s==='not_implemented')lost+=c.weight;
      else if(s==='partial')lost+=Math.ceil(c.weight/2);
    });
    md+=`### ${FAMILIES[fk]} (${fk})\n- Max Weight: ${maxPts}\n- Points Lost: ${lost}\n- Controls: ${fc.length}\n\n`;
  });
  md+=`---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

function genPOAM(){
  const{gaps}=calcScore();
  let md=`# Plan of Action & Milestones (POA&M)\n\n**Organization:** ${state.p1.legalName||'[TBD]'}\n**Date:** ${new Date().toLocaleDateString()}\n\n`;
  md+=`| # | Control ID | Weakness | Planned Remediation | Risk Level | Target Date |\n|---|---|---|---|---|---|\n`;
  const remediations={
    AC:'Implement access control policies and enforce least privilege',AT:'Develop and deliver security awareness training program',
    AU:'Deploy SIEM/logging solution and establish log review processes',CM:'Establish configuration baselines and change management procedures',
    IA:'Implement MFA and strengthen authentication mechanisms',IR:'Develop IR plan and conduct tabletop exercises',
    MA:'Establish maintenance procedures and controls',MP:'Implement media protection and encryption controls',
    PS:'Establish personnel screening and termination procedures',PE:'Implement physical access controls and monitoring',
    RA:'Conduct risk assessments and vulnerability scanning',CA:'Establish security assessment and POA&M processes',
    SC:'Implement boundary protection and encryption',SI:'Deploy endpoint protection and vulnerability management'
  };
  gaps.forEach((g,i)=>{
    const risk=g.weight>=5?'HIGH':g.weight>=3?'MEDIUM':'LOW';
    const s=state.controls[g.id];
    const weakness=s==='partial'?'Partially implemented — gaps remain':'Not implemented';
    const target=new Date();target.setDate(target.getDate()+(g.weight>=5?90:180));
    md+=`| ${i+1} | ${g.id} | ${weakness} | ${remediations[g.family]||'Implement control requirements'} | ${risk} | ${target.toLocaleDateString()} |\n`;
  });
  md+=`\n---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

  let md=`# Evidence Checklist\n## CMMC Level 2 Assessment\n\n**Date:** ${new Date().toLocaleDateString()}\n\n`;
  const evidence={

function genDoc(type){
  const generators={exec:['Executive_Summary.md',genExecSummary],ssp:['System_Security_Plan.md',genSSP],matrix:['Control_Compliance_Matrix.md',genMatrix],sprs:['SPRS_Score_Report.md',genSPRS],poam:['POA_M.md',genPOAM],evidence:['Evidence_Checklist.md',genEvidence]};
  const[fn,gen]=generators[type];
  
  // Add loading state
  const button = event.target;
  const originalText = button.innerHTML;
  button.innerHTML = '<span class="loading-spinner"></span>Generating...';
  button.disabled = true;
  
  setTimeout(() => {
    dl(fn,gen());
    button.innerHTML = originalText;
    button.disabled = false;
  }, 500);
}

async function genZip(){
  const zip=new JSZip();
  zip.file('Executive_Summary.md',genExecSummary());
  zip.file('System_Security_Plan.md',genSSP());
  zip.file('Control_Compliance_Matrix.md',genMatrix());
  zip.file('SPRS_Score_Report.md',genSPRS());

  zip.file('Evidence_Checklist.md',genEvidence());

  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='CMMC_L2_SSP_Package.zip';a.click();
}

function genDetailedPOAM(){
  const{gaps}=calcScore();
  const poamItems = gaps.filter(g => {
    const status = state.controls[g.id];
    return status === 'partial' || status === 'not_implemented' || !status;
  });
  
  let md=`# Detailed Plan of Action & Milestones (POA&M)\n\n**Organization:** ${state.p1.legalName||'[TBD]'}\n**Date:** ${new Date().toLocaleDateString()}\n**Total Items:** ${poamItems.length}\n\n`;
  
  if(poamItems.length === 0) {
    md += `## Status: Complete ✅\n\nAll NIST 800-171 Rev 2 controls are properly implemented. No POA&M items required.\n\n---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
    return md;
  }
  
  md += `| Item # | Control ID | Control Title | Current Status | Risk Level | Target Date | Responsible Party | Estimated Cost | Recommended Action |\n`;
  md += `|--------|------------|---------------|----------------|------------|-------------|-------------------|----------------|--------------------|\n`;
  
  poamItems.forEach((item, index) => {
    const status = state.controls[item.id];
    const riskLevel = item.weight >= 5 ? 'HIGH' : item.weight >= 3 ? 'MEDIUM' : 'LOW';
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + (item.weight >= 5 ? 90 : 180));
    const weakness = status === 'partial' ? 'Partially Implemented' : 'Not Implemented';
    const action = getRecommendedAction(item.family, item.id);
    const estimatedCost = item.weight >= 5 ? '$5,000-$15,000' : item.weight >= 3 ? '$2,000-$8,000' : '$500-$3,000';
    
    md += `| ${index + 1} | ${item.id} | ${item.title} | ${weakness} | ${riskLevel} | ${targetDate.toLocaleDateString()} | [TBD] | ${estimatedCost} | ${action} |\n`;
  });
  
  md += `\n## Priority Recommendations\n\n`;
  const highRisk = poamItems.filter(i => i.weight >= 5);
  if(highRisk.length > 0) {
    md += `### Immediate Action Required (High Risk)\n\n`;
    highRisk.forEach((item, index) => {
      md += `${index + 1}. **${item.id}** — ${item.title}\n   - **Impact:** ${item.weight} points\n   - **Action:** ${getRecommendedAction(item.family, item.id)}\n   - **Timeline:** 90 days\n\n`;
    });
  }
  
  md+=`\n---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

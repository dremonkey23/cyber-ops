<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Ops — CMMC Level 2 SSP Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text-muted:#8b949e;--accent:#58a6ff;--accent2:#1f6feb;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--radius:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:960px;margin:0 auto;padding:20px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 0;position:sticky;top:0;z-index:100}
header .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.logo{font-size:1.4em;font-weight:700}.logo span{color:var(--accent)}
.brand-sub{font-size:.75em;color:var(--text-muted)}
.progress-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 0}
.progress-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .4s;border-radius:3px}
.phase-labels{display:flex;justify-content:space-between;margin-top:8px;font-size:.7em;color:var(--text-muted)}
.phase-labels span.active{color:var(--accent);font-weight:600}
.phase-labels span.done{color:var(--green)}
.phase{display:none;animation:fadeIn .3s}.phase.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
h2{font-size:1.5em;margin-bottom:8px}
h3{font-size:1.15em;margin:20px 0 10px;color:var(--accent)}
.subtitle{color:var(--text-muted);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-weight:600;margin-bottom:6px;font-size:.9em}
.form-group .hint{font-size:.8em;color:var(--text-muted);margin-bottom:4px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9em;font-family:var(--font)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:10px}
.checkbox-group label{display:flex;align-items:center;gap:6px;font-weight:400;cursor:pointer;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:.85em}
.checkbox-group label:has(input:checked){border-color:var(--accent);background:rgba(88,166,255,.1)}
.checkbox-group input{accent-color:var(--accent)}
.radio-group{display:flex;flex-wrap:wrap;gap:10px}
.radio-group label{display:flex;align-items:center;gap:6px;font-weight:400;cursor:pointer;padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:.9em}
.radio-group label:has(input:checked){border-color:var(--accent);background:rgba(88,166,255,.1)}
.radio-group input{accent-color:var(--accent)}
.yn-group{display:flex;gap:8px}
.yn-group label{padding:8px 20px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:.9em}
.yn-group label:has(input:checked){border-color:var(--green);background:rgba(63,185,80,.1)}
.nav-buttons{display:flex;justify-content:space-between;margin-top:32px;gap:12px;flex-wrap:wrap}
.btn{padding:10px 24px;border:none;border-radius:var(--radius);font-size:.9em;cursor:pointer;font-weight:600;transition:all .2s}
.btn-primary{background:var(--accent2);color:#fff}.btn-primary:hover{background:var(--accent)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.8}
.btn-success{background:var(--green);color:#000}.btn-success:hover{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.accordion{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.accordion-header{padding:14px 16px;background:var(--surface2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;user-select:none}
.accordion-header:hover{background:var(--border)}
.accordion-header .arrow{transition:transform .2s}
.accordion.open .arrow{transform:rotate(90deg)}
.accordion-body{display:none;padding:16px;background:var(--surface)}
.accordion.open .accordion-body{display:block}
.control-family{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.family-header{padding:12px 16px;background:var(--surface2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600}
.family-header:hover{background:var(--border)}
.family-header .badge{font-size:.75em;padding:2px 8px;border-radius:12px;background:var(--surface);color:var(--text-muted)}
.family-body{display:none;padding:0}
.control-family.open .family-body{display:block}
.control-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
.control-row:hover{background:rgba(88,166,255,.03)}
.control-id{font-weight:700;font-size:.8em;color:var(--accent);min-width:120px;flex-shrink:0;padding-top:2px}
.control-desc{flex:1;font-size:.85em;color:var(--text-muted)}
.control-status{min-width:160px;flex-shrink:0}
.control-status select{width:100%;padding:6px 8px;font-size:.8em}
.search-box{margin-bottom:16px}
.search-box input{width:100%;padding:10px 14px;font-size:.95em}
.score-display{text-align:center;padding:30px}
.score-number{font-size:4em;font-weight:800;line-height:1}
.score-number.green{color:var(--green)}.score-number.yellow{color:var(--yellow)}.score-number.red{color:var(--red)}
.score-label{font-size:1.1em;color:var(--text-muted);margin-top:4px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin:24px 0}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .num{font-size:2em;font-weight:700}.stat-card .lbl{color:var(--text-muted);font-size:.85em}
.family-bar{margin-bottom:8px}
.family-bar-label{display:flex;justify-content:space-between;font-size:.85em;margin-bottom:4px}
.family-bar-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.family-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.doc-buttons{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-top:20px}
.doc-btn{padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:left;transition:all .2s}
.doc-btn:hover{border-color:var(--accent);background:rgba(88,166,255,.05)}
.doc-btn .doc-title{font-weight:700;margin-bottom:4px}.doc-btn .doc-desc{font-size:.8em;color:var(--text-muted)}
.hidden{display:none!important}
.completion-pct{font-size:.75em;color:var(--green);margin-left:8px}
footer{text-align:center;padding:24px;color:var(--text-muted);font-size:.8em;border-top:1px solid var(--border);margin-top:40px}
.gap-item{padding:10px;background:var(--surface2);border-radius:var(--radius);margin-bottom:8px;border-left:3px solid var(--red)}
.gap-item .gap-id{font-weight:700;color:var(--accent)}.gap-item .gap-weight{float:right;color:var(--red);font-weight:700}
@media(max-width:600px){.control-row{flex-direction:column}.control-status{min-width:auto;width:100%}.control-id{min-width:auto}}
.start-over{position:fixed;bottom:20px;right:20px;z-index:50}
</style>
</head>

<header><div class="container"><div><div class="logo">🛡️ Cyber Ops — <span>CMMC Level 2 SSP Builder</span></div><div class="brand-sub">By <a href="https://mirzayanllc.com/" target="_blank">Mirzayan LLC</a></div></div><button class="btn btn-danger start-over" onclick="startOver()">Start Over</button></div></header>
<div class="progress-bar"><div class="container"><div class="progress-track"><div class="progress-fill" id="progressFill"></div></div><div class="phase-labels" id="phaseLabels"></div></div></div>
<div class="container" id="app"></div>
<footer>© 2026 <a href="https://mirzayanllc.com/" target="_blank">Mirzayan LLC</a> — CMMC Level 2 SSP Builder. All assessment data stays in your browser.</footer>

<script>
// ============================================================
// DATA: All 110 NIST 800-171 Rev 2 controls
// ============================================================
const CONTROLS = [
// ACCESS CONTROL (AC) — 22
{id:"AC.L2-3.1.1",family:"AC",title:"Authorized Access Control",desc:"Limit system access to authorized users, processes acting on behalf of authorized users, and devices (including other systems).",weight:5},
{id:"AC.L2-3.1.2",family:"AC",title:"Transaction & Function Control",desc:"Limit system access to the types of transactions and functions that authorized users are permitted to execute.",weight:5},
{id:"AC.L2-3.1.3",family:"AC",title:"CUI Flow Control",desc:"Control the flow of CUI in accordance with approved authorizations.",weight:5},
{id:"AC.L2-3.1.4",family:"AC",title:"Separation of Duties",desc:"Separate the duties of individuals to reduce the risk of malevolent activity without collusion.",weight:3},
{id:"AC.L2-3.1.5",family:"AC",title:"Least Privilege",desc:"Employ the principle of least privilege, including for specific security functions and privileged accounts.",weight:5},
{id:"AC.L2-3.1.6",family:"AC",title:"Non-Privileged Account Use",desc:"Use non-privileged accounts or roles when accessing nonsecurity functions.",weight:3},
{id:"AC.L2-3.1.7",family:"AC",title:"Privileged Functions",desc:"Prevent non-privileged users from executing privileged functions and capture the execution of such functions in audit logs.",weight:5},
{id:"AC.L2-3.1.8",family:"AC",title:"Unsuccessful Logon Attempts",desc:"Limit unsuccessful logon attempts.",weight:3},
{id:"AC.L2-3.1.9",family:"AC",title:"Privacy & Security Notices",desc:"Provide privacy and security notices consistent with applicable CUI rules.",weight:1},
{id:"AC.L2-3.1.10",family:"AC",title:"Session Lock",desc:"Use session lock with pattern-hiding displays to prevent access and viewing of data after a period of inactivity.",weight:3},
{id:"AC.L2-3.1.11",family:"AC",title:"Session Termination",desc:"Terminate (automatically) a user session after a defined condition.",weight:3},
{id:"AC.L2-3.1.12",family:"AC",title:"Remote Access Control",desc:"Monitor and control remote access sessions.",weight:5},
{id:"AC.L2-3.1.13",family:"AC",title:"Remote Access Encryption",desc:"Employ cryptographic mechanisms to protect the confidentiality of remote access sessions.",weight:5},
{id:"AC.L2-3.1.14",family:"AC",title:"Remote Access Routing",desc:"Route remote access via managed access control points.",weight:3},
{id:"AC.L2-3.1.15",family:"AC",title:"Privileged Remote Access",desc:"Authorize remote execution of privileged commands and remote access to security-relevant information.",weight:5},
{id:"AC.L2-3.1.16",family:"AC",title:"Wireless Access Authorization",desc:"Authorize wireless access prior to allowing such connections.",weight:3},
{id:"AC.L2-3.1.17",family:"AC",title:"Wireless Access Protection",desc:"Protect wireless access using authentication and encryption.",weight:5},
{id:"AC.L2-3.1.18",family:"AC",title:"Mobile Device Connection",desc:"Control connection of mobile devices.",weight:3},
{id:"AC.L2-3.1.19",family:"AC",title:"Encrypt CUI on Mobile",desc:"Encrypt CUI on mobile devices and mobile computing platforms.",weight:5},
{id:"AC.L2-3.1.20",family:"AC",title:"External Connections",desc:"Verify and control/limit connections to and use of external systems.",weight:3},
{id:"AC.L2-3.1.21",family:"AC",title:"Portable Storage Use",desc:"Limit use of portable storage devices on external systems.",weight:3},
{id:"AC.L2-3.1.22",family:"AC",title:"Publicly Accessible Content",desc:"Control information posted or processed on publicly accessible systems.",weight:3},
// AWARENESS & TRAINING (AT) — 3
{id:"AT.L2-3.2.1",family:"AT",title:"Security Awareness",desc:"Ensure that managers, systems administrators, and users of organizational systems are made aware of the security risks associated with their activities and of the applicable policies, standards, and procedures related to the security of those systems.",weight:3},
{id:"AT.L2-3.2.2",family:"AT",title:"Role-Based Training",desc:"Ensure that personnel are trained to carry out their assigned information security-related duties and responsibilities.",weight:3},
{id:"AT.L2-3.2.3",family:"AT",title:"Insider Threat Awareness",desc:"Provide security awareness training on recognizing and reporting potential indicators of insider threat.",weight:3},
// AUDIT & ACCOUNTABILITY (AU) — 9
{id:"AU.L2-3.3.1",family:"AU",title:"System Auditing",desc:"Create and retain system audit logs and records to the extent needed to enable the monitoring, analysis, investigation, and reporting of unlawful or unauthorized system activity.",weight:5},
{id:"AU.L2-3.3.2",family:"AU",title:"User Accountability",desc:"Ensure that the actions of individual system users can be uniquely traced to those users so they can be held accountable for their actions.",weight:5},
{id:"AU.L2-3.3.3",family:"AU",title:"Event Review",desc:"Review and update logged events.",weight:3},
{id:"AU.L2-3.3.4",family:"AU",title:"Audit Failure Alerting",desc:"Alert in the event of an audit logging process failure.",weight:3},
{id:"AU.L2-3.3.5",family:"AU",title:"Audit Correlation",desc:"Correlate audit record review, analysis, and reporting processes for investigation and response to indications of unlawful, unauthorized, suspicious, or unusual activity.",weight:3},
{id:"AU.L2-3.3.6",family:"AU",title:"Audit Reduction & Reporting",desc:"Provide audit record reduction and report generation to support on-demand analysis and reporting.",weight:3},
{id:"AU.L2-3.3.7",family:"AU",title:"Authoritative Time Source",desc:"Provide a system capability that compares and synchronizes internal system clocks with an authoritative source to generate time stamps for audit records.",weight:1},
{id:"AU.L2-3.3.8",family:"AU",title:"Audit Protection",desc:"Protect audit information and audit logging tools from unauthorized access, modification, and deletion.",weight:5},
{id:"AU.L2-3.3.9",family:"AU",title:"Audit Management",desc:"Limit management of audit logging functionality to a subset of privileged users.",weight:3},
// CONFIGURATION MANAGEMENT (CM) — 9
{id:"CM.L2-3.4.1",family:"CM",title:"System Baselining",desc:"Establish and maintain baseline configurations and inventories of organizational systems (including hardware, software, firmware, and documentation) throughout the respective system development life cycles.",weight:5},
{id:"CM.L2-3.4.2",family:"CM",title:"Security Configuration Enforcement",desc:"Establish and enforce security configuration settings for information technology products employed in organizational systems.",weight:5},
{id:"CM.L2-3.4.3",family:"CM",title:"System Change Management",desc:"Track, review, approve or disapprove, and log changes to organizational systems.",weight:3},
{id:"CM.L2-3.4.4",family:"CM",title:"Security Impact Analysis",desc:"Analyze the security impact of changes prior to implementation.",weight:3},
{id:"CM.L2-3.4.5",family:"CM",title:"Access Restrictions for Change",desc:"Define, document, approve, and enforce physical and logical access restrictions associated with changes to organizational systems.",weight:3},
{id:"CM.L2-3.4.6",family:"CM",title:"Least Functionality",desc:"Employ the principle of least functionality by configuring organizational systems to provide only essential capabilities.",weight:3},
{id:"CM.L2-3.4.7",family:"CM",title:"Nonessential Functionality",desc:"Restrict, disable, or prevent the use of nonessential programs, functions, ports, protocols, and services.",weight:3},
{id:"CM.L2-3.4.8",family:"CM",title:"Application Execution Policy",desc:"Apply deny-by-exception (blacklisting) policy or deny-all, permit-by-exception (whitelisting) policy to prevent the use of unauthorized software.",weight:3},
{id:"CM.L2-3.4.9",family:"CM",title:"User-Installed Software",desc:"Control and monitor user-installed software.",weight:3},
// IDENTIFICATION & AUTHENTICATION (IA) — 11
{id:"IA.L2-3.5.1",family:"IA",title:"Identification",desc:"Identify system users, processes acting on behalf of users, and devices.",weight:5},
{id:"IA.L2-3.5.2",family:"IA",title:"Authentication",desc:"Authenticate (or verify) the identities of users, processes, or devices, as a prerequisite to allowing access to organizational systems.",weight:5},
{id:"IA.L2-3.5.3",family:"IA",title:"Multifactor Authentication",desc:"Use multifactor authentication for local and network access to privileged accounts and for network access to non-privileged accounts.",weight:5},
{id:"IA.L2-3.5.4",family:"IA",title:"Replay-Resistant Authentication",desc:"Employ replay-resistant authentication mechanisms for network access to privileged and non-privileged accounts.",weight:3},
{id:"IA.L2-3.5.5",family:"IA",title:"Identifier Reuse Prevention",desc:"Prevent reuse of identifiers for a defined period.",weight:1},
{id:"IA.L2-3.5.6",family:"IA",title:"Identifier Handling",desc:"Disable identifiers after a defined period of inactivity.",weight:1},
{id:"IA.L2-3.5.7",family:"IA",title:"Password Complexity",desc:"Enforce a minimum password complexity and change of characters when new passwords are created.",weight:3},
{id:"IA.L2-3.5.8",family:"IA",title:"Password Reuse",desc:"Prohibit password reuse for a specified number of generations.",weight:1},
{id:"IA.L2-3.5.9",family:"IA",title:"Temporary Passwords",desc:"Allow temporary password use for system logons with an immediate change to a permanent password.",weight:1},
{id:"IA.L2-3.5.10",family:"IA",title:"Cryptographic Password Storage",desc:"Store and transmit only cryptographically-protected passwords.",weight:5},
{id:"IA.L2-3.5.11",family:"IA",title:"Obscure Feedback",desc:"Obscure feedback of authentication information.",weight:1},
// INCIDENT RESPONSE (IR) — 3
{id:"IR.L2-3.6.1",family:"IR",title:"Incident Handling",desc:"Establish an operational incident-handling capability for organizational systems that includes preparation, detection, analysis, containment, recovery, and user response activities.",weight:5},
{id:"IR.L2-3.6.2",family:"IR",title:"Incident Reporting",desc:"Track, document, and report incidents to designated officials and/or authorities both internal and external to the organization.",weight:3},
{id:"IR.L2-3.6.3",family:"IR",title:"Incident Response Testing",desc:"Test the organizational incident response capability.",weight:3},
// MAINTENANCE (MA) — 6
{id:"MA.L2-3.7.1",family:"MA",title:"System Maintenance",desc:"Perform maintenance on organizational systems.",weight:3},
{id:"MA.L2-3.7.2",family:"MA",title:"Maintenance Controls",desc:"Provide controls on the tools, techniques, mechanisms, and personnel used to conduct system maintenance.",weight:3},
{id:"MA.L2-3.7.3",family:"MA",title:"Equipment Sanitization",desc:"Ensure equipment removed for off-site maintenance is sanitized of any CUI.",weight:5},
{id:"MA.L2-3.7.4",family:"MA",title:"Media Inspection",desc:"Check media containing diagnostic and test programs for malicious code before the media are used in organizational systems.",weight:3},
{id:"MA.L2-3.7.5",family:"MA",title:"Nonlocal Maintenance",desc:"Require multifactor authentication to establish nonlocal maintenance sessions via external network connections and terminate such connections when nonlocal maintenance is complete.",weight:5},
{id:"MA.L2-3.7.6",family:"MA",title:"Maintenance Personnel",desc:"Supervise the maintenance activities of maintenance personnel without required access authorization.",weight:3},
// MEDIA PROTECTION (MP) — 8
{id:"MP.L2-3.8.1",family:"MP",title:"Media Protection",desc:"Protect (i.e., physically control and securely store) system media containing CUI, both paper and digital.",weight:3},
{id:"MP.L2-3.8.2",family:"MP",title:"Media Access",desc:"Limit access to CUI on system media to authorized users.",weight:3},
{id:"MP.L2-3.8.3",family:"MP",title:"Media Sanitization",desc:"Sanitize or destroy system media containing CUI before disposal or release for reuse.",weight:5},
{id:"MP.L2-3.8.4",family:"MP",title:"Media Markings",desc:"Mark media with necessary CUI markings and distribution limitations.",weight:1},
{id:"MP.L2-3.8.5",family:"MP",title:"Media Accountability",desc:"Control access to media containing CUI and maintain accountability for media during transport outside of controlled areas.",weight:3},
{id:"MP.L2-3.8.6",family:"MP",title:"Portable Storage Encryption",desc:"Implement cryptographic mechanisms to protect the confidentiality of CUI stored on digital media during transport unless otherwise protected by alternative physical safeguards.",weight:5},
{id:"MP.L2-3.8.7",family:"MP",title:"Removable Media",desc:"Control the use of removable media on system components.",weight:3},
{id:"MP.L2-3.8.8",family:"MP",title:"Shared Media",desc:"Prohibit the use of portable storage devices when such devices have no identifiable owner.",weight:1},
// PERSONNEL SECURITY (PS) — 2
{id:"PS.L2-3.9.1",family:"PS",title:"Screen Individuals",desc:"Screen individuals prior to authorizing access to organizational systems containing CUI.",weight:3},
{id:"PS.L2-3.9.2",family:"PS",title:"Personnel Actions",desc:"Ensure that organizational systems containing CUI are protected during and after personnel actions such as terminations and transfers.",weight:5},
// PHYSICAL PROTECTION (PE) — 6
{id:"PE.L2-3.10.1",family:"PE",title:"Physical Access Limitation",desc:"Limit physical access to organizational systems, equipment, and the respective operating environments to authorized individuals.",weight:5},
{id:"PE.L2-3.10.2",family:"PE",title:"Physical Access Protection",desc:"Protect and monitor the physical facility and support infrastructure for organizational systems.",weight:3},
{id:"PE.L2-3.10.3",family:"PE",title:"Escort Visitors",desc:"Escort visitors and monitor visitor activity.",weight:1},
{id:"PE.L2-3.10.4",family:"PE",title:"Physical Access Logs",desc:"Maintain audit logs of physical access.",weight:3},
{id:"PE.L2-3.10.5",family:"PE",title:"Physical Access Devices",desc:"Control and manage physical access devices.",weight:3},
{id:"PE.L2-3.10.6",family:"PE",title:"Alternative Work Sites",desc:"Enforce safeguarding measures for CUI at alternate work sites.",weight:3},
// RISK ASSESSMENT (RA) — 3
{id:"RA.L2-3.11.1",family:"RA",title:"Risk Assessments",desc:"Periodically assess the risk to organizational operations (including mission, functions, image, or reputation), organizational assets, and individuals, resulting from the operation of organizational systems and the associated processing, storage, or transmission of CUI.",weight:3},
{id:"RA.L2-3.11.2",family:"RA",title:"Vulnerability Scanning",desc:"Scan for vulnerabilities in organizational systems and applications periodically and when new vulnerabilities affecting those systems and applications are identified.",weight:5},
{id:"RA.L2-3.11.3",family:"RA",title:"Vulnerability Remediation",desc:"Remediate vulnerabilities in accordance with risk assessments.",weight:5},
// SECURITY ASSESSMENT (CA) — 4
{id:"CA.L2-3.12.1",family:"CA",title:"Security Control Assessment",desc:"Periodically assess the security controls in organizational systems to determine if the controls are effective in their application.",weight:3},
{id:"CA.L2-3.12.2",family:"CA",title:"Plan of Action",desc:"Develop and implement plans of action designed to correct deficiencies and reduce or eliminate vulnerabilities in organizational systems.",weight:5},
{id:"CA.L2-3.12.3",family:"CA",title:"Continuous Monitoring",desc:"Monitor security controls on an ongoing basis to ensure the continued effectiveness of the controls.",weight:3},
{id:"CA.L2-3.12.4",family:"CA",title:"System Security Plans",desc:"Develop, document, and periodically update system security plans that describe system boundaries, system environments of operation, how security requirements are implemented, and the relationships with or connections to other systems.",weight:5},
// SYSTEM & COMMUNICATIONS PROTECTION (SC) — 16
{id:"SC.L2-3.13.1",family:"SC",title:"Boundary Protection",desc:"Monitor, control, and protect communications (i.e., information transmitted or received by organizational systems) at the external boundaries and key internal boundaries of organizational systems.",weight:5},
{id:"SC.L2-3.13.2",family:"SC",title:"Security Architecture",desc:"Employ architectural designs, software development techniques, and systems engineering principles that promote effective information security within organizational systems.",weight:3},
{id:"SC.L2-3.13.3",family:"SC",title:"Role Separation",desc:"Separate user functionality from system management functionality.",weight:3},
{id:"SC.L2-3.13.4",family:"SC",title:"Shared Resource Control",desc:"Prevent unauthorized and unintended information transfer via shared system resources.",weight:3},
{id:"SC.L2-3.13.5",family:"SC",title:"Public-Access System Separation",desc:"Implement subnetworks for publicly accessible system components that are physically or logically separated from internal networks.",weight:5},

// ============================================================
function autoPopulate(){
  const c = state.controls;
  const {p2a,p2b,p2c,p2d,p2e,p2f,p2g,p3} = state;
  // MFA
  if(p2a.mfa && p2a.mfa.includes('all users')){c['IA.L2-3.5.3']='implemented'}
  else if(p2a.mfa && p2a.mfa.includes('privileged users')){c['IA.L2-3.5.3']='partial'}
  else if(p2a.mfa && p2a.mfa.includes('none')){c['IA.L2-3.5.3']='not_implemented'}
  // Password complexity
  if(p2a.pwComplexity==='yes'&&parseInt(p2a.pwMinLen)>=12){c['IA.L2-3.5.7']='implemented'}
  else if(p2a.pwComplexity==='yes'){c['IA.L2-3.5.7']='partial'}
  // Identity provider
  if(p2a.idp&&p2a.idp!=='Other'){c['IA.L2-3.5.1']='implemented';c['IA.L2-3.5.2']='implemented'}
  // Account review
  if(p2a.acctReview==='monthly'||p2a.acctReview==='quarterly'){c['AC.L2-3.1.5']='implemented';c['IA.L2-3.5.6']='implemented'}
  else if(p2a.acctReview==='never'){c['IA.L2-3.5.6']='not_implemented'}
  // EDR
  if(p2b.edr&&p2b.edr!=='None'){c['SI.L2-3.14.2']='implemented';c['SI.L2-3.14.4']='implemented';c['SI.L2-3.14.5']='implemented'}
  else if(p2b.edr==='None'){c['SI.L2-3.14.2']='not_implemented';c['SI.L2-3.14.5']='not_implemented'}
  // Encryption
  if(p2b.encryption==='all devices'){c['MP.L2-3.8.6']='implemented';c['SC.L2-3.13.16']='implemented';c['AC.L2-3.1.19']='implemented'}
  else if(p2b.encryption==='none'){c['MP.L2-3.8.6']='not_implemented';c['SC.L2-3.13.16']='not_implemented'}
  // Patch
  if(p2b.patchFreq==='weekly'||p2b.patchFreq==='monthly'){c['SI.L2-3.14.1']='implemented'}
  else if(p2b.patchFreq==='ad-hoc'){c['SI.L2-3.14.1']='partial'}
  // Asset inventory
  if(p2b.assetInv&&p2b.assetInv.toLowerCase()!=='none'&&p2b.assetInv!==''){c['CM.L2-3.4.1']='implemented'}
  // Network seg
  if(p2c.netSeg==='yes'){c['SC.L2-3.13.5']='implemented'}
  if(p2c.vpn==='yes'){c['AC.L2-3.1.13']='implemented';c['AC.L2-3.1.14']='implemented'}
  if(p2c.ids==='yes'){c['SI.L2-3.14.6']='implemented'}
  else if(p2c.ids==='no'){c['SI.L2-3.14.6']='not_implemented'}
  // SIEM
  if(p2d.siem&&p2d.siem.toLowerCase()!=='none'&&p2d.siem!==''){c['AU.L2-3.3.1']='implemented';c['AU.L2-3.3.5']='implemented';c['AU.L2-3.3.6']='implemented'}
  else if(p2d.siem===''||p2d.siem==='None'){c['AU.L2-3.3.1']='not_implemented';c['AU.L2-3.3.5']='not_implemented'}
  if(p2d.logRetention==='1 year'||p2d.logRetention==='2+ years'){c['AU.L2-3.3.8']='implemented'}
  if(p2d.alertTriage==='yes'){c['AU.L2-3.3.4']='implemented'}
  // Vuln
  if(p2e.vulnScanner&&p2e.vulnScanner.toLowerCase()!=='none'&&p2e.vulnScanner!==''){c['RA.L2-3.11.2']='implemented'}
  else{c['RA.L2-3.11.2']='not_implemented'}
  if(p2e.patchSLA==='yes'){c['RA.L2-3.11.3']='implemented'}
  if(p2e.cisBaselines==='yes'){c['CM.L2-3.4.2']='implemented'}
  // IR
  if(p2f.irPlan==='yes'){c['IR.L2-3.6.1']='implemented';c['IR.L2-3.6.2']='implemented'}
  else if(p2f.irPlan==='no'){c['IR.L2-3.6.1']='not_implemented';c['IR.L2-3.6.2']='not_implemented'}
  if(p2f.irTest&&p2f.irTest!=='Never'&&p2f.irTest!==''){c['IR.L2-3.6.3']='implemented'}
  else{c['IR.L2-3.6.3']='not_implemented'}
  // Physical
  if(p2g.accessControls&&(p2g.accessControls.includes('badge/keycard')||p2g.accessControls.includes('biometric'))){c['PE.L2-3.10.1']='implemented';c['PE.L2-3.10.5']='implemented'}
  if(p2g.visitorLog==='yes'){c['PE.L2-3.10.3']='implemented';c['PE.L2-3.10.4']='implemented'}
  if(p2g.mediaSan==='yes'){c['MP.L2-3.8.3']='implemented';c['MA.L2-3.7.3']='implemented'}
  // Policies
  if(p3.secPolicies==='yes'){c['CA.L2-3.12.4']='implemented'}
  if(p3.aup==='yes'){c['AT.L2-3.2.1']='partial'}
  if(p3.accessPolicy==='yes'){c['AC.L2-3.1.1']='implemented';c['AC.L2-3.1.2']='implemented'}
  if(p3.irPolicy==='yes'&&p2f.irPlan==='yes'){c['IR.L2-3.6.1']='implemented'}
  if(p3.training==='yes'){c['AT.L2-3.2.1']='implemented';c['AT.L2-3.2.2']='implemented';c['AT.L2-3.2.3']='implemented'}
  if(p3.vendorRisk==='yes'){c['CA.L2-3.12.1']='partial'}
  if(p3.poam==='yes'){c['CA.L2-3.12.2']='implemented'}
  save();
}

// ============================================================
// SPRS SCORE
// ============================================================
function calcScore(){
  let score=110;
  const gaps=[];
  CONTROLS.forEach(ctrl=>{
    const s=state.controls[ctrl.id];
    if(!s||s==='not_implemented'){score-=ctrl.weight;gaps.push(ctrl)}
    else if(s==='partial'){score-=Math.ceil(ctrl.weight/2);gaps.push(ctrl)}
  });
  gaps.sort((a,b)=>b.weight-a.weight);
  return{score,gaps};
}

function render(){
  const app=$('#app');
  const pct=Math.round((state.phase/6)*100);
  $('#progressFill').style.width=pct+'%';
  let labels='';
  PHASE_NAMES.forEach((n,i)=>{
    const cls=i<state.phase?'done':i===state.phase?'active':'';
    labels+=`<span class="${cls}">${n}</span>`;
  });
  $('#phaseLabels').innerHTML=labels;
  const renderers=[renderPhase0,renderPhase1,renderPhase2,renderPhase3,renderPhase4,renderPhase5,renderPhase6];
  app.innerHTML='<div class="phase active">'+renderers[state.phase]()+'</div>';
  bindEvents();
}

function yn(name,stateObj,key){
  const v=stateObj[key]||'';
  return`<div class="yn-group"><label><input type="radio" name="${name}" value="yes" ${v==='yes'?'checked':''}> Yes</label><label><input type="radio" name="${name}" value="no" ${v==='no'?'checked':''}> No</label></div>`;
}
function dd(name,opts,val){
  let h=`<select data-field="${name}"><option value="">— Select —</option>`;
  opts.forEach(o=>h+=`<option value="${o}" ${val===o?'selected':''}>${o}</option>`);
  return h+'</select>';
}
function ti(name,val,ph){return`<input type="text" data-field="${name}" value="${val||''}" placeholder="${ph||''}">`}
function ni(name,val,ph){return`<input type="number" data-field="${name}" value="${val||''}" placeholder="${ph||''}" min="0">`}
function cb(name,opts,vals){
  vals=vals||[];
  let h='<div class="checkbox-group">';
  opts.forEach(o=>h+=`<label><input type="checkbox" data-cbgroup="${name}" value="${o}" ${vals.includes(o)?'checked':''}> ${o}</label>`);
  return h+'</div>';
}

  const cls=score>=80?'green':score>=50?'yellow':'red';
  const total=CONTROLS.length;
  let impl=0,partial=0,notImpl=0,inherited=0;
  CONTROLS.forEach(c=>{const s=state.controls[c.id];if(s==='implemented')impl++;else if(s==='partial')partial++;else if(s==='inherited')inherited++;else notImpl++});
  let h=`<h2>Phase 5: Results Dashboard</h2>`;
  h+=`<div class="score-display"><div class="score-number ${cls}">${score}</div><div class="score-label">SPRS Score (out of 110)</div></div>`;
  h+=`<div class="stats-grid">
    <div class="stat-card"><div class="num" style="color:var(--green)">${impl}</div><div class="lbl">✅ Implemented</div></div>
    <div class="stat-card"><div class="num" style="color:var(--yellow)">${partial}</div><div class="lbl">🟡 Partial</div></div>
    <div class="stat-card"><div class="num" style="color:var(--red)">${notImpl}</div><div class="lbl">❌ Not Implemented</div></div>
    <div class="stat-card"><div class="num" style="color:var(--purple)">${inherited}</div><div class="lbl">🔄 Inherited</div></div>
  </div>`;
  // Family breakdown
  h+=`<h3>Compliance by Family</h3>`;
  Object.keys(FAMILIES).forEach(fk=>{
    const fc=CONTROLS.filter(c=>c.family===fk);
    const done=fc.filter(c=>state.controls[c.id]==='implemented'||state.controls[c.id]==='inherited').length;
    const pct=Math.round(done/fc.length*100);
    const color=pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';
    h+=`<div class="family-bar"><div class="family-bar-label"><span>${FAMILIES[fk]} (${fk})</span><span>${done}/${fc.length}</span></div>
    <div class="family-bar-track"><div class="family-bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
  });
  // Top gaps
  h+=`<h3>Top 5 Gaps (Highest Impact)</h3>`;
  gaps.slice(0,5).forEach(g=>{
    h+=`<div class="gap-item"><span class="gap-id">${g.id}</span> — ${g.title}<span class="gap-weight">−${g.weight} pts</span><br><small style="color:var(--text-muted)">${g.desc}</small></div>`;
  });
  // Risk level
  const risk=score>=80?'LOW':score>=50?'MODERATE':'HIGH';
  const riskColor=score>=80?'var(--green)':score>=50?'var(--yellow)':'var(--red)';
  h+=`<div style="text-align:center;margin:24px 0;padding:16px;background:var(--surface2);border-radius:var(--radius)"><span style="font-size:1.2em;font-weight:700;color:${riskColor}">Overall Risk Level: ${risk}</span></div>`;
  h+=nav(5);
  return h;
}

function fg(label,inner){return`<div class="form-group"><label>${label}</label>${inner}</div>`}
function nav(phase){
  let h='<div class="nav-buttons">';
  if(phase>0)h+=`<button class="btn btn-secondary" onclick="goPhase(${phase-1})">← Back</button>`;
  else h+='<div></div>';
  if(phase<6){
    const nextPhase=phase+1;
    const label=phase===3?'Auto-Populate & Continue →':'Next →';
    h+=`<button class="btn btn-primary" onclick="${phase===3?'autoPopulate();':''}goPhase(${nextPhase})">${label}</button>`;
  }
  h+='</div>';
  return h;
}

function toggleAcc(key){const el=$(`[data-acc="${key}"]`);el.classList.toggle('open')}
function toggleFamily(key){const el=$(`[data-family="${key}"]`);el.classList.toggle('open')}

// ============================================================
// EVENT BINDING
// ============================================================
function bindEvents(){
  // Map phase → state key prefix
  const phaseMap={0:'p0',1:'p1',3:'p3'};
  // Text/select/number/date inputs
  $$('[data-field]').forEach(el=>{
    el.addEventListener('change',()=>{
      const field=el.dataset.field;
      // Determine which state object
      let target=getStateTarget(field);
      if(target)target[field]=el.value;
      save();
    });
    el.addEventListener('input',()=>{
      const field=el.dataset.field;
      let target=getStateTarget(field);
      if(target)target[field]=el.value;
      save();
    });
  });
  // Radio buttons
  $$('input[type=radio]').forEach(el=>{
    el.addEventListener('change',()=>{
      const name=el.name;
      const val=el.value;
      if(name==='handlesCUI'){state.p0.handlesCUI=val;save();render();return}
      if(name.startsWith('cui')){state.p0[name]=val;save();return}
      if(name==='goal'){state.p0.goal=val;save();return}
      // yn fields
      const ynMap={dodContractor:'p0',bidding:'p0',cageSam:'p0',useMSP:'p1',
        pwComplexity:'p2a',netSeg:'p2c',vpn:'p2c',ids:'p2c',alertTriage:'p2d',
        patchSLA:'p2e',cisBaselines:'p2e',irPlan:'p2f',irTeam:'p2f',breachNotif:'p2f',
        visitorLog:'p2g',mediaSan:'p2g'};
      if(name.startsWith('p3_')){state.p3[name.slice(3)]=val;save();return}
      if(ynMap[name]){state[ynMap[name]][name]=val;save();if(name==='useMSP')render();return}
    });
  });
  // Checkbox groups
  $$('[data-cbgroup]').forEach(el=>{
    el.addEventListener('change',()=>{
      const group=el.dataset.cbgroup;
      const checked=[...document.querySelectorAll(`[data-cbgroup="${group}"]:checked`)].map(e=>e.value);
      let target=getCBTarget(group);
      if(target)target.obj[target.key]=checked;
      save();
    });
  });
  // Control selects
  $$('[data-control]').forEach(el=>{
    el.addEventListener('change',()=>{state.controls[el.dataset.control]=el.value;save()});
  });
  // Search
  const searchEl=$('#ctrlSearch');
  if(searchEl){
    searchEl.addEventListener('input',()=>{
      const q=searchEl.value.toLowerCase();
      state.searchFilter=q;
      $$('.control-row').forEach(row=>{
        row.style.display=row.dataset.ctrlSearch.includes(q)?'':'none';
      });
      // Open families that have visible controls
      if(q){$$('.control-family').forEach(f=>{
        const vis=f.querySelectorAll('.control-row[style=""],.control-row:not([style])');
        const hasVis=[...f.querySelectorAll('.control-row')].some(r=>r.style.display!=='none');
        if(hasVis)f.classList.add('open');else f.classList.remove('open');
      })}
    });
  }
}

function getStateTarget(field){
  // Phase 2 sub-sections
  const p2aFields=['idp','pwMinLen','pwComplexity','pwRotation','privAccess','acctReview'];
  const p2bFields=['edr','encryption','patchTool','patchFreq','assetInv'];
  const p2cFields=['firewall','remoteAccess','emailSec'];
  const p2dFields=['siem','logRetention','logReview'];
  const p2eFields=['vulnScanner','scanFreq'];
  const p2fFields=['irTest'];
  const p2gFields=['disposal'];
  if(p2aFields.includes(field))return state.p2a;
  if(p2bFields.includes(field))return state.p2b;
  if(p2cFields.includes(field))return state.p2c;
  if(p2dFields.includes(field))return state.p2d;
  if(p2eFields.includes(field))return state.p2e;
  if(p2fFields.includes(field))return state.p2f;
  if(p2gFields.includes(field))return state.p2g;
  // Phase 1
  const p1Fields=['legalName','empCount','itUsers','locations','bizFunc','mspName','cuiEntry','cuiProcess','cuiStore','cuiExit','netSep'];
  if(p1Fields.includes(field))return state.p1;
  return null;
}
function getCBTarget(group){
  const map={mfa:{obj:state.p2a,key:'mfa'},endpointTypes:{obj:state.p2b,key:'endpointTypes'},
    accessControls:{obj:state.p2g,key:'accessControls'},cuiTypes:{obj:state.p1,key:'cuiTypes'},
    cuiStorage:{obj:state.p1,key:'cuiStorage'}};
  return map[group]||null;
}

function dl(filename,content){
  const blob=new Blob([content],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

function genExecSummary(){
  const{score,gaps}=calcScore();
  const org=state.p1.legalName||'[Organization]';
  const risk=score>=80?'LOW':score>=50?'MODERATE':'HIGH';
  let md=`# CMMC Level 2 — Executive Summary\n\n**Organization:** ${org}\n**Date:** ${new Date().toLocaleDateString()}\n**Assessment Goal:** ${state.p0.goal||'N/A'}\n\n---\n\n## SPRS Score: ${score} / 110\n\n**Risk Level:** ${risk}\n\n`;
  md+=`## Compliance Overview\n\n`;
  let impl=0,partial=0,notImpl=0,inherited=0;
  CONTROLS.forEach(c=>{const s=state.controls[c.id];if(s==='implemented')impl++;else if(s==='partial')partial++;else if(s==='inherited')inherited++;else notImpl++});
  md+=`- Implemented: ${impl}\n- Partially Implemented: ${partial}\n- Not Implemented: ${notImpl}\n- Inherited: ${inherited}\n\n`;
  md+=`## Top Gaps\n\n`;
  gaps.slice(0,5).forEach(g=>{md+=`- **${g.id}** — ${g.title} (Weight: ${g.weight})\n  ${g.desc}\n\n`});
  md+=`## Recommendations\n\n`;
  if(gaps.length>0){
    md+=`1. Prioritize remediation of high-weight controls listed above\n`;
    md+=`2. Develop POA&M items for all non-implemented controls\n`;
    md+=`3. Engage security team to address gaps before C3PAO assessment\n`;
    md+=`4. Implement continuous monitoring to maintain compliance posture\n`;
  }else{md+=`All controls are implemented. Maintain current posture and prepare for C3PAO assessment.\n`}
  md+=`\n---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

function genSSP(){
  const o=state.p1;const{score}=calcScore();
  let md=`# System Security Plan (SSP)\n## CMMC Level 2 — NIST SP 800-171 Rev 2\n\n`;
  md+=`**Organization:** ${o.legalName||'[TBD]'}\n**Date:** ${new Date().toLocaleDateString()}\n**SPRS Score:** ${score}\n\n---\n\n`;
  md+=`## 1. System Identification\n\n- **Organization:** ${o.legalName||'[TBD]'}\n- **Employees:** ${o.empCount||'[TBD]'}\n- **IT Users:** ${o.itUsers||'[TBD]'}\n- **Locations:** ${o.locations||'[TBD]'}\n- **Primary Function:** ${o.bizFunc||'[TBD]'}\n- **MSP/MSSP:** ${o.useMSP==='yes'?(o.mspName||'Yes'):'No'}\n\n`;
  md+=`## 2. CUI Boundary\n\n- **CUI Types:** ${(o.cuiTypes||[]).join(', ')||'[TBD]'}\n- **Storage:** ${(o.cuiStorage||[]).join(', ')||'[TBD]'}\n- **Entry Points:** ${o.cuiEntry||'[TBD]'}\n- **Processing:** ${o.cuiProcess||'[TBD]'}\n- **Storage Locations:** ${o.cuiStore||'[TBD]'}\n- **Exit Points:** ${o.cuiExit||'[TBD]'}\n- **Network Separation:** ${o.netSep||'[TBD]'}\n\n`;
  md+=`## 3. Technical Environment\n\n`;
  md+=`### Identity & Access Management\n- Identity Provider: ${state.p2a.idp||'[TBD]'}\n- MFA: ${(state.p2a.mfa||[]).join(', ')||'[TBD]'}\n- Password Min Length: ${state.p2a.pwMinLen||'[TBD]'}\n- Account Review: ${state.p2a.acctReview||'[TBD]'}\n\n`;
  md+=`### Endpoint Security\n- Types: ${(state.p2b.endpointTypes||[]).join(', ')||'[TBD]'}\n- EDR: ${state.p2b.edr||'[TBD]'}\n- Encryption: ${state.p2b.encryption||'[TBD]'}\n- Patching: ${state.p2b.patchFreq||'[TBD]'}\n\n`;
  md+=`### Network Security\n- Firewall: ${state.p2c.firewall||'[TBD]'}\n- Segmentation: ${state.p2c.netSeg||'[TBD]'}\n- VPN: ${state.p2c.vpn||'[TBD]'}\n- IDS/IPS: ${state.p2c.ids||'[TBD]'}\n\n`;
  md+=`### Logging & Monitoring\n- SIEM: ${state.p2d.siem||'[TBD]'}\n- Log Retention: ${state.p2d.logRetention||'[TBD]'}\n- Log Review: ${state.p2d.logReview||'[TBD]'}\n\n`;
  md+=`## 4. Control Implementation\n\n`;
  Object.keys(FAMILIES).forEach(fk=>{
    md+=`### ${FAMILIES[fk]} (${fk})\n\n`;
    CONTROLS.filter(c=>c.family===fk).forEach(c=>{
      const s=state.controls[c.id]||'Not Assessed';
      const statusLabel=STATUS_OPTIONS.find(o=>o.v===s)?.l||'Not Assessed';
      md+=`**${c.id} — ${c.title}**\nRequirement: ${c.desc}\nStatus: ${statusLabel}\n\n`;
    });
  });
  md+=`---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

function genMatrix(){
  let md=`# Control Compliance Matrix\n## CMMC Level 2 — NIST SP 800-171 Rev 2\n\n**Date:** ${new Date().toLocaleDateString()}\n\n`;
  md+=`| Control ID | Title | Status | Weight |\n|---|---|---|---|\n`;
  CONTROLS.forEach(c=>{
    const s=state.controls[c.id]||'Not Assessed';
    const label=STATUS_OPTIONS.find(o=>o.v===s)?.l||'Not Assessed';
    md+=`| ${c.id} | ${c.title} | ${label} | ${c.weight} |\n`;
  });
  md+=`\n---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

function genSPRS(){
  const{score}=calcScore();
  let md=`# SPRS Score Report\n\n**Organization:** ${state.p1.legalName||'[TBD]'}\n**Date:** ${new Date().toLocaleDateString()}\n**Total Score:** ${score} / 110\n\n---\n\n`;
  Object.keys(FAMILIES).forEach(fk=>{
    const fc=CONTROLS.filter(c=>c.family===fk);
    let maxPts=fc.reduce((a,c)=>a+c.weight,0);
    let lost=0;
    fc.forEach(c=>{
      const s=state.controls[c.id];
      if(!s||s==='not_implemented')lost+=c.weight;
      else if(s==='partial')lost+=Math.ceil(c.weight/2);
    });
    md+=`### ${FAMILIES[fk]} (${fk})\n- Max Weight: ${maxPts}\n- Points Lost: ${lost}\n- Controls: ${fc.length}\n\n`;
  });
  md+=`---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

function genPOAM(){
  const{gaps}=calcScore();
  let md=`# Plan of Action & Milestones (POA&M)\n\n**Organization:** ${state.p1.legalName||'[TBD]'}\n**Date:** ${new Date().toLocaleDateString()}\n\n`;
  md+=`| # | Control ID | Weakness | Planned Remediation | Risk Level | Target Date |\n|---|---|---|---|---|---|\n`;
  const remediations={
    AC:'Implement access control policies and enforce least privilege',AT:'Develop and deliver security awareness training program',
    AU:'Deploy SIEM/logging solution and establish log review processes',CM:'Establish configuration baselines and change management procedures',
    IA:'Implement MFA and strengthen authentication mechanisms',IR:'Develop IR plan and conduct tabletop exercises',
    MA:'Establish maintenance procedures and controls',MP:'Implement media protection and encryption controls',
    PS:'Establish personnel screening and termination procedures',PE:'Implement physical access controls and monitoring',
    RA:'Conduct risk assessments and vulnerability scanning',CA:'Establish security assessment and POA&M processes',
    SC:'Implement boundary protection and encryption',SI:'Deploy endpoint protection and vulnerability management'
  };
  gaps.forEach((g,i)=>{
    const risk=g.weight>=5?'HIGH':g.weight>=3?'MEDIUM':'LOW';
    const s=state.controls[g.id];
    const weakness=s==='partial'?'Partially implemented — gaps remain':'Not implemented';
    const target=new Date();target.setDate(target.getDate()+(g.weight>=5?90:180));
    md+=`| ${i+1} | ${g.id} | ${weakness} | ${remediations[g.family]||'Implement control requirements'} | ${risk} | ${target.toLocaleDateString()} |\n`;
  });
  md+=`\n---\n*Generated by Cyber Ops — CMMC Level 2 SSP Builder | Mirzayan LLC*\n`;
  return md;
}

  const evidence={
    AC:['Access control policy','User account listing with roles','Remote access configuration screenshots','Wireless access policy','MFA configuration evidence','Session timeout settings'],

function genDoc(type){
  const generators={exec:['Executive_Summary.md',genExecSummary],ssp:['System_Security_Plan.md',genSSP],matrix:['Control_Compliance_Matrix.md',genMatrix],sprs:['SPRS_Score_Report.md',genSPRS],poam:['POA_M.md',genPOAM],evidence:['Evidence_Checklist.md',genEvidence]};
  const[fn,gen]=generators[type];
  dl(fn,gen());
}

async function genZip(){
  const zip=new JSZip();
  zip.file('Executive_Summary.md',genExecSummary());
  zip.file('System_Security_Plan.md',genSSP());
  zip.file('Control_Compliance_Matrix.md',genMatrix());
  zip.file('SPRS_Score_Report.md',genSPRS());

  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='CMMC_L2_SSP_Package.zip';a.click();
}
